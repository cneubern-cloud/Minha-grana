<html lang="pt-BR">
<head>

  <style>

    select option{background:#302b63;color:#fff}
    .header{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);padding:16px 20px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

    .gasto-valor{text-align:right}

    .form-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:14px;outline:none}

    .checkbox-row input{accent-color:#a29bfe;width:16px;height:16px}
    .checkbox-row label{font-size:13px;color:rgba(255,255,255,0.7);cursor:pointer}
    .add-btn{width:100%;margin-top:18px;padding:14px 0;border:none;border-radius:12px;background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:0.5px}

    .virar-mes-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:14px}
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
    .modal{background:#1e1b3a;border-radius:20px;padding:24px;width:100%;border:1px solid rgba(255,255,255,0.1)}
    .modal-title{font-size:18px;font-weight:800;margin-bottom:8px}

    .modal-btn-row{display:flex;gap:10px}
    .modal-confirm{flex:1;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff;font-weight:800;font-size:14px;cursor:pointer}
    .modal-cancel{flex:1;padding:12px;border:none;border-radius:12px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-weight:700;font-size:14px;cursor:pointer}
    .empty-msg{text-align:center;color:rgba(255,255,255,0.3);padding:40px;font-size:14px}
    .dica-box{background:rgba(162,155,254,0.08);border-radius:14px;padding:12px 14px;border:1px solid rgba(162,155,254,0.15);margin-bottom:14px;font-size:12px;color:rgba(255,255,255,0.65);line-height:1.6}
    .dica-box strong{color:#a29bfe}
    .cal-grid{display:flex;flex-wrap:wrap;gap:4px}
    .cal-day{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid rgba(255,255,255,0.05)}
    .cat-row{margin-bottom:12px}
    .cat-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
    .cat-bar{background:rgba(255,255,255,0.1);border-radius:99px;height:6px}
    .cat-fill{height:100%;border-radius:99px;transition:width 0.4s}
    #install-banner{display:none!important;}
    #install-banner p{font-size:13px;font-weight:600}
    #install-banner small{font-size:11px;opacity:0.8;display:block;margin-top:2px}
    .install-btn{background:#fff;color:#6c5ce7;border:none;border-radius:10px;padding:8px 16px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
    .dismiss-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:4px 8px;margin-left:8px}

#loginWrap{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);}
.login-box{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:36px 28px;width:340px;max-width:95vw;}

.toast-fb{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#6c5ce7;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast-fb.show{opacity:1;}
  </style>
</head>
<body>

<div id="loginWrap" style="display:none;">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:40px;margin-bottom:8px;">💰</div>
      <h1>Minha Grana</h1>
      <p>Faça login para acessar</p>
    </div>
    <div class="login-field"><label>E-mail</label><input type="email" id="lgEmail" placeholder="seu@email.com" autocomplete="email"/></div>
    <div class="login-field"><label>Senha</label><input type="password" id="lgSenha" placeholder="Mínimo 6 caracteres" autocomplete="current-password"/></div>
    <div class="login-err" id="lgErro"></div>
    <button class="login-btn" id="btnLogin">Entrar</button>
    <button class="login-btn2" id="btnCadastro">Criar conta</button>
    <p class="login-hint">Primeira vez? Preencha e-mail e senha<br>e clique em "Criar conta"</p>
  </div>
</div>
<div class="toast-fb" id="toastFb"></div>
<div id="appWrap" style="display:none;">
<div id="app"></div>
</div><!-- /appWrap -->
<div id="modal-virar" style="display:none" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">🔄 Virar o Mês?</div>
    <div class="modal-msg">Os gastos das semanas serão apagados, contas fixas resetadas e parcelas avançadas.<br><br>O resumo do mês será salvo no Histórico.</div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="document.getElementById('modal-virar').style.display='none'">Cancelar</button>
      <button class="modal-confirm" onclick="confirmarVirarMes()">✓ Virar o Mês</button>
    </div>

</div>

    <button class="install-btn" id="install-btn">Instalar</button>
    <button class="dismiss-btn" id="dismiss-btn">✕</button>
  </div>
</div>
<script>
var CATS={
  moradia:{label:"Moradia",emoji:"🏠",cor:"#e74c3c"},
  alimentacao:{label:"Alimentação",emoji:"🍽️",cor:"#e67e22"},
  transporte:{label:"Transporte",emoji:"🚗",cor:"#f39c12"},
  saude:{label:"Saúde",emoji:"💊",cor:"#27ae60"},
  lazer:{label:"Lazer",emoji:"🎮",cor:"#9b59b6"},
  assinaturas:{label:"Assinaturas",emoji:"📱",cor:"#3498db"},
  roupas:{label:"Roupas e Calçados",emoji:"👗",cor:"#fd79a8"},
  educacao:{label:"Educação e Cursos",emoji:"📚",cor:"#00b894"},
  beleza:{label:"Beleza e Estética",emoji:"💅",cor:"#e84393"},
  pet:{label:"Pet",emoji:"🐾",cor:"#fdcb6e"},
  presentes:{label:"Presentes",emoji:"🎁",cor:"#ff7675"},
  dividas:{label:"Dívidas e Parcelas",emoji:"💳",cor:"#d63031"},
  investimentos:{label:"Investimentos",emoji:"🏦",cor:"#00cec9"},
  casa:{label:"Casa e Manutenção",emoji:"🧹",cor:"#6c5ce7"},
  outros:{label:"Outros",emoji:"📦",cor:"#95a5a6"}
};

var SEMANAS=[
  {nome:"Semana 1",dias:[1,7]},
  {nome:"Semana 2",dias:[8,14]},
  {nome:"Semana 3",dias:[15,21]},
  {nome:"Semana 4",dias:[22,31]}
];

var GASTOS_PADRAO=[
  {id:1,pago:false,descricao:"Água",valor:100,categoria:"moradia",dia:10,fixo:true},
  {id:2,pago:false,descricao:"Luz",valor:300,categoria:"moradia",dia:10,fixo:true},
  {id:3,pago:false,descricao:"Internet e Celular",valor:220,categoria:"moradia",dia:15,fixo:true},
  {id:4,pago:false,descricao:"IPTU",valor:241.16,categoria:"moradia",dia:10,fixo:true},
  {id:5,pago:false,descricao:"Filtro",valor:99.90,categoria:"moradia",dia:10,fixo:true},
  {id:6,pago:false,descricao:"Faxina",valor:280,categoria:"moradia",dia:15,fixo:true},
  {id:7,pago:false,descricao:"Cachorras",valor:300,categoria:"pet",dia:1,fixo:true},
  {id:8,pago:false,descricao:"Plano de Saúde",valor:960.38,categoria:"saude",dia:1,fixo:true},
  {id:9,pago:false,descricao:"Estacionamento",valor:200,categoria:"transporte",dia:5,fixo:true},
  {id:10,pago:false,descricao:"Combustível",valor:300,categoria:"transporte",dia:1,fixo:true},
  {id:11,pago:false,descricao:"Seguro",valor:195.05,categoria:"transporte",dia:10,fixo:true},
  {id:12,pago:false,descricao:"Investimento",valor:300,categoria:"investimentos",dia:1,fixo:true},
  {id:13,pago:false,descricao:"Saque (guardar em casa)",valor:300,categoria:"outros",dia:1,fixo:true},
  {id:14,pago:false,descricao:"iFood (Cartão #1)",valor:500,categoria:"alimentacao",dia:1,fixo:true}
];

var PARCELAS_PADRAO=[
  {id:1,pago:false,descricao:"Curso",valorTotal:2580,valorParcela:258,totalParcelas:10,parcelaAtual:1,categoria:"educacao",dia:10}
];

var ENVELOPES_PADRAO={alimentacao:600,beleza:200,roupas:300,presentes:100,casa:100,pet:100,saude:100,outros:745.51};

function salvar(){
  try{
    localStorage.setItem('mg_salario',st.salario);
    localStorage.setItem('mg_gastos',JSON.stringify(st.gastos));
    localStorage.setItem('mg_parcelas',JSON.stringify(st.parcelas));
    localStorage.setItem('mg_gsem',JSON.stringify(st.gsem));
    localStorage.setItem('mg_env',JSON.stringify(st.envelopes));
    localStorage.setItem('mg_hist',JSON.stringify(st.historico));
  }catch(e){}
}

function carregar(){
  try{
    var sal=parseFloat(localStorage.getItem('mg_salario'))||7200;
    var gas=JSON.parse(localStorage.getItem('mg_gastos'))||GASTOS_PADRAO;
    var par=JSON.parse(localStorage.getItem('mg_parcelas'))||PARCELAS_PADRAO;
    var gsem=JSON.parse(localStorage.getItem('mg_gsem'))||[];
    var env=JSON.parse(localStorage.getItem('mg_env'))||ENVELOPES_PADRAO;
    var hist=JSON.parse(localStorage.getItem('mg_hist'))||[];
    return{salario:sal,gastos:gas,parcelas:par,gsem:gsem,envelopes:env,historico:hist};
  }catch(e){
    return{salario:7200,gastos:GASTOS_PADRAO,parcelas:PARCELAS_PADRAO,gsem:[],envelopes:ENVELOPES_PADRAO,historico:[]};
  }
}

var dados=carregar();
var hoje=new Date().getDate();
var st={
  salario:dados.salario,
  gastos:dados.gastos,
  parcelas:dados.parcelas,
  gsem:dados.gsem,
  envelopes:dados.envelopes,
  historico:dados.historico,
  aba:'semanas',
  ocultar:false,
  editSal:false,
  salTemp:dados.salario,
  form:{descricao:'',valor:'',categoria:'alimentacao',dia:hoje,fixo:false},
  formP:{descricao:'',valorTotal:'',parcelas:'',categoria:'educacao',dia:hoje},
  formGS:{descricao:'',valor:'',categoria:'alimentacao'},
  editGastoId:null,
  editGastoForm:{descricao:'',valor:'',categoria:'moradia',dia:1},
  editParcelaId:null,
  editParcelaForm:{descricao:'',valorTotal:'',totalParcelas:'',parcelaAtual:'',categoria:'educacao',dia:1},
  editEnv:null,
  envTemp:''
};

function fmt(v){
  if(st&&st.ocultar)return'R$ ••••';
  return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function semAtual(){
  for(var i=0;i<SEMANAS.length;i++){
    if(hoje>=SEMANAS[i].dias[0]&&hoje<=SEMANAS[i].dias[1])return i;
  }
  return 3;
}

function catOptions(sel){
  var h='';
  Object.keys(CATS).forEach(function(k){
    h+='<option value="'+k+'"'+(sel===k?' selected':'')+'>'+CATS[k].emoji+' '+CATS[k].label+'</option>';
  });
  return h;
}

function diaOptions(sel){
  var h='';
  for(var d=1;d<=31;d++){
    h+='<option value="'+d+'"'+(sel===d?' selected':'')+'>Dia '+d+'</option>';
  }
  return h;
}

function render(){
  var sal=st.salario;
  var gastos=st.gastos;
  var parcelas=st.parcelas;
  var envelopes=st.envelopes;
  var aba=st.aba;

  var totalPagos=0;
  var totalPendentes=0;
  gastos.forEach(function(g){if(g.pago)totalPagos+=g.valor;else totalPendentes+=g.valor;});
  var totalParcelasPagas=0;
  var totalParcelasPendentes=0;
  parcelas.forEach(function(p){if(p.pago)totalParcelasPagas+=p.valorParcela;else totalParcelasPendentes+=p.valorParcela;});

  var totalGsem=0;
  st.gsem.forEach(function(g){totalGsem+=g.valor;});

  var saldo=sal-totalPagos-totalParcelasPagas-totalGsem;
  var pct=Math.min(((totalPagos+totalPendentes+totalParcelasPagas+totalParcelasPendentes+totalGsem)/sal)*100,100);
  var corSaldo=saldo>sal*0.3?'#27ae60':saldo>0?'#f39c12':'#e74c3c';
  var msgSaldo=saldo>sal*0.3?'Ótimo! Você está bem.':saldo>0?'Atenção! Margem apertada.':'🚨 Gastos maiores que a renda!';
  var corProg=pct>90?'#e74c3c':pct>70?'#f39c12':'#27ae60';

  var sobra=sal-(totalPagos+totalPendentes+totalParcelasPagas+totalParcelasPendentes+totalGsem);
  var porSemana=sobra/4;
  var porDia=sobra/30;

  // Header
  var headerRight='';
  if(st.editSal){
    headerRight='<div class="salary-edit"><input class="salary-input" id="sal-input" type="number" value="'+st.salTemp+'" oninput="st.salTemp=parseFloat(this.value)"/><button class="salary-btn" onclick="confirmarSalario()">✓</button></div>';
  }else{
    headerRight='<div class="salary-display" onclick="editarSalario()"><div class="salary-label">Salário mensal</div><div class="salary-value">'+fmt(sal)+'</div></div>';
  }

  // Tabs row 1
  var tabs1='<div class="tabs" style="margin-bottom:6px">';
  tabs1+='<button class="tab-btn '+(aba==='semanas'?'active':'inactive')+'" onclick="setAba(\'semanas\')">📅 Semanas</button>';
  tabs1+='<button class="tab-btn '+(aba==='parcelas'?'active':'inactive')+'" onclick="setAba(\'parcelas\')">💳 Parcelas</button>';
  tabs1+='<button class="tab-btn '+(aba==='envelope'?'active':'inactive')+'" onclick="setAba(\'envelope\')">📦 Envelope</button>';
  tabs1+='</div>';

  var tabs2='<div class="tabs">';
  tabs2+='<button class="tab-btn '+(aba==='fixos'?'active':'inactive')+'" onclick="setAba(\'fixos\')">📋 Fixos</button>';
  tabs2+='<button class="tab-btn '+(aba==='historico'?'active':'inactive')+'" onclick="setAba(\'historico\')">📆 Histórico</button>';
  tabs2+='<button class="tab-btn '+(aba==='adicionar'?'active':'inactive')+'" onclick="setAba(\'adicionar\')">➕ Adicionar</button>';
  tabs2+='</div>';

  // Saldo card
  var saldoCard='<div class="saldo-card" style="background:linear-gradient(135deg,'+corSaldo+'22,'+corSaldo+'44);border:2px solid '+corSaldo+'66">';
  saldoCard+='<div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:4px;letter-spacing:1px">SALDO DISPONÍVEL</div>';
  saldoCard+='<div style="font-size:34px;font-weight:900;letter-spacing:-1px;color:'+corSaldo+'">'+fmt(saldo)+'</div>';
  saldoCard+='<div style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:6px">'+msgSaldo+'</div>';

  saldoCard+='<div class="progress-labels"><span>Pago: '+fmt(totalPagos+totalParcelasPagas+totalGsem)+'</span><span>A pagar: '+fmt(totalPendentes+totalParcelasPendentes)+'</span></div>';
  if(totalPendentes>0){
    saldoCard+='<div style="margin-top:8px;font-size:11px;color:rgba(255,200,0,0.8)">⏳ '+gastos.filter(function(g){return!g.pago;}).length+' conta(s) pendente(s): '+fmt(totalPendentes)+'</div>';
  }else{
    saldoCard+='<div style="margin-top:8px;font-size:11px;color:#27ae60">✅ Todas as contas fixas pagas!</div>';
  }
  saldoCard+='</div>';

  // Mini cards
  var miniCards='<div class="mini-cards-row">';
  miniCards+='<div class="mini-card"><div class="mini-card-emoji">📅</div><div class="mini-card-label">Por Semana</div><div class="mini-card-valor">'+fmt(porSemana)+'</div><div class="mini-card-sub">4 semanas</div></div>';

  if(aba==='semanas') abaHtml=renderSemanas(porSemana);

        '<button onclick="st.ocultar=!st.ocultar;render()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px">'+(st.ocultar?'👁️':'🙈')+'</button>'+

function renderSemanas(porSemana){
  var html='';
  var semIdx=semAtual();
  for(var i=0;i<SEMANAS.length;i++){
    var sem=SEMANAS[i];
    var gastosSem=0;
    st.gsem.filter(function(g){return g.semana===i;}).forEach(function(g){gastosSem+=g.valor;});
    var saldoSem=porSemana-gastosSem;
    var pctSem=Math.min((gastosSem/porSemana)*100,100);
    var corSem=saldoSem>porSemana*0.5?'#27ae60':saldoSem>0?'#f39c12':'#e74c3c';
    var isAtual=i===semIdx;
    var gastosList=st.gsem.filter(function(g){return g.semana===i;});

    html+='<div class="semana-card card" style="'+(isAtual?'border-color:rgba(162,155,254,0.5);background:rgba(162,155,254,0.05)':'')+'">';
    html+='<div class="semana-header"><div class="semana-nome">'+sem.nome+' <span style="font-size:11px;color:rgba(255,255,255,0.4)">(dias '+sem.dias[0]+'–'+sem.dias[1]+')</span></div>';
    if(isAtual)html+='<span class="semana-badge">📍 Agora</span>';
    html+='</div>';
    html+='<div class="semana-valores">';
    html+='<div class="semana-val-box"><div class="semana-val-label">Orçamento</div><div class="semana-val-num" style="color:#a29bfe">'+fmt(porSemana)+'</div></div>';
    html+='<div class="semana-val-box"><div class="semana-val-label">Gasto</div><div class="semana-val-num" style="color:#ff7675">'+fmt(gastosSem)+'</div></div>';
    html+='<div class="semana-val-box"><div class="semana-val-label">Restante</div><div class="semana-val-num" style="color:'+corSem+'">'+fmt(saldoSem)+'</div>';
    if(saldoSem>0)html+='<div class="semana-val-dia" style="color:'+corSem+'">'+fmt(saldoSem/(sem.dias[1]-sem.dias[0]+1))+'/dia</div>';
    html+='</div></div>';
    html+='<div class="semana-bar"><div class="semana-bar-fill" style="width:'+pctSem+'%;background:'+corSem+'"></div></div>';

    if(gastosList.length>0){
      html+='<div style="margin-top:10px">';
      gastosList.forEach(function(g){
        var cat=CATS[g.categoria]||CATS.outros;
        html+='<div class="gs-item">';
        html+='<div class="gs-icon" style="background:'+cat.cor+'99">'+cat.emoji+'</div>';
        html+='<div class="gs-info"><div class="gs-nome">'+g.descricao+'</div><div class="gs-sub">'+cat.label+'</div></div>';
        html+='<div class="gs-valor">'+fmt(g.valor)+'</div>';
        html+='<button data-id="'+g.id+'" onclick="remGsem(this.dataset.id)" style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:16px;padding:0 0 0 8px">✕</button>';
        html+='</div>';
      });
      html+='</div>';
    }

    if(isAtual){
      html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)">';
      html+='<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:8px">Registrar gasto nesta semana:</div>';
      html+='<input class="form-input" style="margin-bottom:8px" placeholder="Descrição" value="'+st.formGS.descricao+'" oninput="st.formGS.descricao=this.value" />';
      html+='<div style="display:flex;gap:8px;margin-bottom:8px">';
      html+='<input class="form-input" type="number" inputmode="decimal" placeholder="R$ Valor" value="'+st.formGS.valor+'" oninput="st.formGS.valor=this.value" />';
      html+='<select class="form-input" onchange="st.formGS.categoria=this.value">'+catOptions(st.formGS.categoria)+'</select>';
      html+='</div>';
      html+='<button class="add-btn" style="margin-top:0" data-sem="'+i+'" onclick="addGsem(this.dataset.sem)">➕ Registrar gasto</button>';
      html+='</div>';
    }
    html+='</div>';
  }
  return html;
}

function renderEnvelope(){
  var catMap={};
  st.gsem.forEach(function(g){catMap[g.categoria]=(catMap[g.categoria]||0)+g.valor;});
  var html='<div class="card"><div class="card-title">📦 Envelope Virtual</div>';
  html+='<div class="dica-box" style="margin-bottom:12px">💡 Defina um limite para cada categoria de gasto variável. Fica vermelho quando chegar no limite!</div>';
  Object.keys(CATS).forEach(function(k){
    var v=CATS[k];
    var gasto=catMap[k]||0;
    var limite=st.envelopes[k]||0;
    var pct=limite>0?Math.min((gasto/limite)*100,100):0;
    var cor=limite>0?(pct>90?'#e74c3c':pct>60?'#f39c12':'#27ae60'):'#a29bfe';
    var isEdit=st.editEnv===k;
    html+='<div class="env-cat">';
    html+='<div class="env-emoji">'+v.emoji+'</div>';
    html+='<div class="env-info">';
    html+='<div class="env-nome">'+v.label+'</div>';
    if(limite>0){
      html+='<div class="env-bar"><div class="env-bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>';
      html+='<div class="env-vals"><span>Gasto: '+fmt(gasto)+'</span><span style="color:'+cor+'">'+fmt(limite-gasto)+' restam</span></div>';
    }else{
      html+='<div style="font-size:10px;color:rgba(255,255,255,0.3)">Sem limite definido</div>';
    }
    if(isEdit){
      html+='<div class="env-input-row">';
      html+='<input class="env-input" type="number" inputmode="decimal" placeholder="Limite R$" value="'+st.envTemp+'" oninput="st.envTemp=this.value" />';
      html+='<button class="env-save-btn" data-key="'+k+'" onclick="salvarEnv(this.dataset.key)">Salvar</button>';
      html+='<button onclick="st.editEnv=null;render()" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px">✕</button>';
      html+='</div>';
    }else{
      html+='<button data-key="'+k+'" onclick="st.editEnv=this.dataset.key;st.envTemp=\''+(limite||'')+'\';render()" style="background:none;border:none;color:rgba(162,155,254,0.7);cursor:pointer;font-size:11px;padding:2px 0">✏️ '+(limite?'Editar limite':'Definir limite')+'</button>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function renderHistorico(){

function confirmarVirarMes(){
  var meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var agora=new Date();
  var mesAnt=agora.getMonth()===0?11:agora.getMonth()-1;
  var anoAnt=agora.getMonth()===0?agora.getFullYear()-1:agora.getFullYear();
  var totalGastos=st.gsem.reduce(function(s,g){return s+g.valor;},0);
  var totalFixos=st.gastos.reduce(function(s,g){return s+g.valor;},0);
  var totalParcelas=st.parcelas.reduce(function(s,p){return s+p.valorParcela;},0);
  var sobra=st.salario-totalFixos-totalParcelas-totalGastos;
  st.historico.push({
    nome:meses[mesAnt]+' '+anoAnt,
    data:agora.toLocaleDateString('pt-BR'),
    salario:st.salario,
    totalGastos:totalGastos,
    totalFixos:totalFixos,
    totalParcelas:totalParcelas,
    sobra:sobra,
    gastos:st.gsem.slice(),
    parcelas:st.parcelas.map(function(p){return Object.assign({},p);})
  });
  st.gsem=[];
  st.gastos=st.gastos.map(function(g){return Object.assign({},g,{pago:false});});
  st.parcelas=st.parcelas.filter(function(p){
    p.parcelaAtual++;p.pago=false;
    return p.parcelaAtual<=p.totalParcelas;
  });
  salvar();
  document.getElementById('modal-virar').style.display='none';
  alert('✅ Mês virado! Histórico salvo.');
  render();
}

// BACKUP & RESTORE
function exportarDados(){
  var dados={
    salario:st.salario,
    gastos:st.gastos,
    parcelas:st.parcelas,
    gsem:st.gsem,
    envelopes:st.envelopes,
    historico:st.historico,
    exportadoEm:new Date().toLocaleString('pt-BR')
  };
  var json=JSON.stringify(dados,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='minha-grana-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importarDados(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var dados=JSON.parse(ev.target.result);
        if(!dados.salario||!dados.gastos){alert('Arquivo inválido!');return;}
        if(!confirm('Isso vai substituir todos os dados atuais. Continuar?'))return;
        st.salario=dados.salario;
        st.gastos=dados.gastos;
        st.parcelas=dados.parcelas||[];
        st.gsem=dados.gsem||[];
        st.envelopes=dados.envelopes||{};
        st.historico=dados.historico||[];
        salvar();render();
        alert('✅ Dados restaurados com sucesso!');
      }catch(err){alert('Erro ao importar: arquivo inválido.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

    localStorage.setItem('mg_gastos', JSON.stringify(st.gastos));
    localStorage.setItem('mg_parcelas', JSON.stringify(st.parcelas));
    localStorage.setItem('mg_gsem', JSON.stringify(st.gsem));
    localStorage.setItem('mg_env', JSON.stringify(st.envelopes));
    localStorage.setItem('mg_hist', JSON.stringify(st.historico));
  } catch(e) {}
  if (window._fbUid) fbSave(window._fbUid);
};

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('lgEmail').value.trim();
  const senha = document.getElementById('lgSenha').value;
  document.getElementById('lgErro').textContent = '';
  try { await signInWithEmailAndPassword(auth, email, senha); }
  catch(e) { document.getElementById('lgErro').textContent = 'E-mail ou senha incorretos.'; }
});

document.getElementById('btnCadastro').addEventListener('click', async () => {
  const email = document.getElementById('lgEmail').value.trim();
  const senha = document.getElementById('lgSenha').value;
  document.getElementById('lgErro').textContent = '';
  if (!email || senha.length < 6) { document.getElementById('lgErro').textContent = 'Preencha e-mail e senha (mín. 6 caracteres).'; return; }
  try { await createUserWithEmailAndPassword(auth, email, senha); }
  catch(e) {
    if (e.code === 'auth/email-already-in-use') document.getElementById('lgErro').textContent = 'E-mail já cadastrado. Faça login.';
    else document.getElementById('lgErro').textContent = 'Erro: ' + e.message;
  }
});

onAuthStateChanged(auth, async (user) => {
  if (user) {
    window._fbUid = user.uid;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'block';
    await fbLoad(user.uid);
  } else {
    window._fbUid = null;
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('appWrap').style.display = 'none';
  }
});
</script>

</body>
</html>

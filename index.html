<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>💰 Minha Grana</title>
<meta name="theme-color" content="#e8f6f6"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Minha Grana"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:linear-gradient(160deg,#e8f6f6 0%,#dff0f2 50%,#eaf7f5 100%);background-attachment:fixed;font-family:-apple-system,'Segoe UI',sans-serif;color:#3d3a4e;padding-bottom:90px}
input,select,button{font-family:inherit}
.header{background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(180,160,220,0.15);padding:16px 20px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#0e7c86}
.header-sub{font-size:11px;color:#7fa8ab;margin-top:2px}
.eye-btn{background:rgba(14,124,134,0.12);border:none;border-radius:8px;padding:6px 10px;color:#0e7c86;cursor:pointer;font-size:16px}
.salary-display{text-align:right;cursor:pointer}
.salary-label{font-size:11px;color:#7fa8ab}
.salary-value{font-size:18px;font-weight:800;color:#0e7c86}
.salary-input{width:110px;padding:6px 10px;border-radius:8px;border:2px solid #4fb3bb;background:#fff;color:#1f3a3d;font-size:14px;text-align:right}
.salary-btn{background:#0e7c86;border:none;border-radius:8px;padding:6px 12px;color:#fff;cursor:pointer;font-weight:700;font-size:16px}
.main{padding:16px}

.hero-card{background:linear-gradient(135deg,#136a76,#0a3d44);border-radius:24px;padding:24px;margin-bottom:16px;box-shadow:0 8px 30px rgba(10,61,68,0.35);color:#fff}
.hero-label{font-size:12px;opacity:0.85;margin-bottom:4px;letter-spacing:0.5px}
.hero-value{font-size:38px;font-weight:900;letter-spacing:-1px}
.hero-sub{font-size:13px;opacity:0.9;margin-top:6px}
.hero-bar{margin-top:16px;background:rgba(255,255,255,0.25);border-radius:99px;height:10px;overflow:hidden}
.hero-bar-fill{height:100%;border-radius:99px;background:#fff;transition:width 0.6s ease}
.hero-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;opacity:0.85}
.hero-alert{margin-top:10px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.18);font-size:12px}

.quick-actions{display:flex;gap:10px;margin-bottom:16px}
.quick-btn{flex:1;padding:14px;border:none;border-radius:16px;font-weight:800;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 4px 14px rgba(0,0,0,0.06)}
.quick-btn.primary{background:linear-gradient(135deg,#136a76,#0a3d44);color:#fff}
.quick-btn.secondary{background:#fff;color:#0e7c86;border:2px solid #cdeaec}
.quick-btn .qi{font-size:22px}

.tabs{display:flex;gap:6px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px}
.tab-btn{flex:1;min-width:62px;padding:10px 4px;border-radius:14px;border:none;cursor:pointer;font-weight:700;font-size:10px;white-space:nowrap}
.tab-btn.active{background:#0e7c86;color:#fff;box-shadow:0 4px 12px rgba(14,124,134,0.3)}
.tab-btn.inactive{background:#fff;color:#7fa8ab}

.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(14,124,134,0.09)}
.card-title{font-size:13px;font-weight:800;margin-bottom:12px;color:#0e7c86}

.cat-row{margin-bottom:14px}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#1f3a3d}
.cat-emoji-bg{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.cat-vals{font-size:12px;font-weight:700}
.cat-bar{background:#dff0f2;border-radius:99px;height:8px;overflow:hidden}
.cat-fill{height:100%;border-radius:99px;transition:width 0.4s}

.lanc-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e3f3f4}
.lanc-item:last-child{border-bottom:none}
.lanc-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.lanc-info{flex:1}
.lanc-nome{font-size:13px;font-weight:700;color:#1f3a3d}
.lanc-sub{font-size:10px;color:#7fa8ab;margin-top:1px}
.lanc-valor{font-size:14px;font-weight:800;color:#d4622f}
.lanc-del{background:none;border:none;color:#a8d4d6;cursor:pointer;font-size:14px;padding:0 0 0 8px}

.cartao-card{border-radius:18px;padding:18px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.cartao-card.c1{background:linear-gradient(135deg,#FFE600,#FFC700)}
.cartao-card.c2{background:linear-gradient(135deg,#0a1f44,#050f22)}
.cartao-card.c3{background:linear-gradient(135deg,#00C2D1,#0090A3)}
.cartao-card.c4{background:linear-gradient(135deg,#0b3d2e,#062619)}
.cartao-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.cartao-nome{font-size:14px;font-weight:800}
.cartao-limite{font-size:10px;opacity:0.85}
.cartao-fatura-label{font-size:11px;opacity:0.85}
.cartao-fatura-val{font-size:28px;font-weight:900;margin-top:2px}
.cartao-bar{margin-top:12px;background:rgba(255,255,255,0.25);border-radius:99px;height:8px;overflow:hidden}
.cartao-bar-fill{height:100%;border-radius:99px;background:#fff}
.cartao-info-row{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;opacity:0.9}

.form-label{font-size:11px;color:#7fa8ab;display:block;margin-bottom:4px;font-weight:600}
.form-label.mt{margin-top:14px}
.form-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid #cdeaec;background:#f7fdfd;color:#1f3a3d;font-size:14px;outline:none}
.form-input:focus{border-color:#0e7c86}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.checkbox-row input{accent-color:#0e7c86;width:16px;height:16px}
.checkbox-row label{font-size:13px;color:#0e7c86;cursor:pointer}
.add-btn{width:100%;margin-top:18px;padding:15px 0;border:none;border-radius:14px;background:linear-gradient(135deg,#136a76,#0a3d44);color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 14px rgba(10,61,68,0.3)}
.add-btn:active{opacity:0.85;transform:scale(0.98)}
.add-btn.pink{background:linear-gradient(135deg,#1a8a96,#0e5c64);box-shadow:0 4px 14px rgba(14,92,100,0.3)}
.toggle-row{display:flex;gap:8px;margin-top:14px}
.toggle-opt{flex:1;padding:10px;border-radius:12px;border:1.5px solid #cdeaec;background:#f7fdfd;text-align:center;font-size:12px;font-weight:700;color:#7fa8ab;cursor:pointer}
.toggle-opt.active{background:#0e7c86;color:#fff;border-color:#0e7c86}

.gasto-item{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(108,92,231,0.06);display:flex;align-items:center;gap:12px}
.gasto-icon{width:40px;height:40px;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gasto-info{flex:1}
.gasto-nome{font-weight:700;font-size:14px;color:#1f3a3d}
.gasto-sub{font-size:11px;color:#7fa8ab;margin-top:2px}
.gasto-valor{text-align:right}
.gasto-valor-num{font-weight:800;font-size:15px;color:#d4622f}

.virar-mes-btn{width:100%;padding:14px;border:none;border-radius:16px;background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 14px rgba(225,112,85,0.25)}
.backup-row{display:flex;gap:8px;margin-bottom:14px}
.backup-btn{flex:1;padding:10px;border:none;border-radius:14px;font-weight:700;font-size:11px;cursor:pointer}
.backup-btn.exp{background:#e3f7f0;color:#0e9c6f}
.backup-btn.imp{background:#dff0f2;color:#0e7c86}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(61,58,78,0.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:22px;padding:24px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.modal-title{font-size:18px;font-weight:800;margin-bottom:8px;color:#1f3a3d}
.modal-msg{font-size:13px;color:#7fa8ab;line-height:1.6;margin-bottom:20px}
.modal-btn-row{display:flex;gap:10px}
.modal-confirm{flex:1;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,#1a8a96,#0a3d44);color:#fff;font-weight:800;font-size:14px;cursor:pointer}
.modal-cancel{flex:1;padding:12px;border:none;border-radius:14px;background:#dff0f2;color:#7fa8ab;font-weight:700;font-size:14px;cursor:pointer}

.empty-msg{text-align:center;color:#a8d4d6;padding:40px;font-size:14px}
.dica-box{background:#dff0f2;border-radius:16px;padding:14px;margin-bottom:14px;font-size:12px;color:#0e7c86;line-height:1.6}
.dica-box strong{color:#0a5c66}

#install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#136a76,#0a3d44);padding:14px 20px;padding-bottom:max(14px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,0.15)}
#install-banner p{font-size:13px;font-weight:600;color:#fff}
#install-banner small{font-size:11px;opacity:0.85;display:block;margin-top:2px;color:#fff}
.install-btn{background:#fff;color:#0e7c86;border:none;border-radius:10px;padding:8px 16px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
.dismiss-btn{background:none;border:none;color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;padding:4px 8px;margin-left:8px}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-virar" style="display:none" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">🔄 Virar o Mês?</div>
    <div class="modal-msg">Os lançamentos do mês serão salvos no Histórico, contas fixas resetadas e faturas dos cartões zeradas para o novo mês.</div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="document.getElementById('modal-virar').style.display='none'">Cancelar</button>
      <button class="modal-confirm" onclick="confirmarVirarMes()">✓ Virar o Mês</button>
    </div>
  </div>
</div>
<div id="install-banner" style="display:none">
  <div><p>📲 Instalar Minha Grana</p><small>Acesse como app</small></div>
  <div style="display:flex;align-items:center">
    <button class="install-btn" id="install-btn">Instalar</button>
    <button class="dismiss-btn" id="dismiss-btn">✕</button>
  </div>
</div>
<script>
var CATS={
  moradia:{label:"Moradia",emoji:"🏠",cor:"#e74c3c"},
  alimentacao:{label:"Alimentação",emoji:"🍽️",cor:"#e67e22"},
  transporte:{label:"Transporte",emoji:"🚗",cor:"#f39c12"},
  saude:{label:"Saúde",emoji:"💊",cor:"#27ae60"},
  lazer:{label:"Lazer",emoji:"🎮",cor:"#9b59b6"},
  assinaturas:{label:"Assinaturas",emoji:"📱",cor:"#3498db"},
  roupas:{label:"Roupas e Calçados",emoji:"👗",cor:"#fd79a8"},
  educacao:{label:"Educação e Cursos",emoji:"📚",cor:"#00b894"},
  beleza:{label:"Beleza e Estética",emoji:"💅",cor:"#e84393"},
  pet:{label:"Pet",emoji:"🐾",cor:"#fdcb6e"},
  presentes:{label:"Presentes",emoji:"🎁",cor:"#ff7675"},
  investimentos:{label:"Investimentos",emoji:"🏦",cor:"#00cec9"},
  casa:{label:"Casa e Manutenção",emoji:"🧹",cor:"#6c5ce7"},
  cartao:{label:"Cartão",emoji:"💳",cor:"#e17055"},
  outros:{label:"Outros",emoji:"📦",cor:"#95a5a6"}
};

var GASTOS_PADRAO=[
  {id:1,pago:false,descricao:"Água",valor:100,categoria:"moradia",dia:10},
  {id:2,pago:false,descricao:"Luz",valor:300,categoria:"moradia",dia:10},
  {id:3,pago:false,descricao:"Internet e Celular",valor:220,categoria:"moradia",dia:15},
  {id:4,pago:false,descricao:"IPTU",valor:241.16,categoria:"moradia",dia:10},
  {id:5,pago:false,descricao:"Filtro",valor:99.90,categoria:"moradia",dia:10},
  {id:6,pago:false,descricao:"Faxina",valor:280,categoria:"moradia",dia:15},
  {id:7,pago:false,descricao:"Cachorras",valor:300,categoria:"pet",dia:1},
  {id:8,pago:false,descricao:"Plano de Saúde",valor:960.38,categoria:"saude",dia:1},
  {id:9,pago:false,descricao:"Estacionamento",valor:200,categoria:"transporte",dia:5},
  {id:10,pago:false,descricao:"Combustível",valor:300,categoria:"transporte",dia:1},
  {id:11,pago:false,descricao:"Seguro",valor:195.05,categoria:"transporte",dia:10},
  {id:12,pago:false,descricao:"Investimento",valor:300,categoria:"investimentos",dia:1},
  {id:13,pago:false,descricao:"Saque (guardar em casa)",valor:300,categoria:"outros",dia:1}
];

var CARTOES_PADRAO=[
  {id:1,nome:"Mercado Pago",limite:500,diaFechamento:25,diaVencimento:5,cor:"c1"},
  {id:2,nome:"Porto Seguro",limite:800,diaFechamento:25,diaVencimento:5,cor:"c2"},
  {id:3,nome:"Neon",limite:500,diaFechamento:25,diaVencimento:5,cor:"c3"},
  {id:4,nome:"PicPay",limite:500,diaFechamento:25,diaVencimento:5,cor:"c4"}
];

var ENVELOPES_PADRAO={alimentacao:600,beleza:200,roupas:300,presentes:100,casa:100,pet:100,saude:100,outros:745.51};
var DIVIDAS_PADRAO=[];

function salvar(){
  try{
    localStorage.setItem('mg2_salario',st.salario);
    localStorage.setItem('mg2_gastos',JSON.stringify(st.gastos));
    localStorage.setItem('mg2_cartoes',JSON.stringify(st.cartoes));
    localStorage.setItem('mg2_lanc',JSON.stringify(st.lancamentos));
    localStorage.setItem('mg2_env',JSON.stringify(st.envelopes));
    localStorage.setItem('mg2_hist',JSON.stringify(st.historico));
    localStorage.setItem('mg2_dividas',JSON.stringify(st.dividas));
  }catch(e){}
}

function carregar(){
  try{
    return{
      salario:parseFloat(localStorage.getItem('mg2_salario'))||7200,
      gastos:JSON.parse(localStorage.getItem('mg2_gastos'))||GASTOS_PADRAO,
      cartoes:JSON.parse(localStorage.getItem('mg2_cartoes'))||CARTOES_PADRAO,
      lancamentos:JSON.parse(localStorage.getItem('mg2_lanc'))||[],
      envelopes:JSON.parse(localStorage.getItem('mg2_env'))||ENVELOPES_PADRAO,
      historico:JSON.parse(localStorage.getItem('mg2_hist'))||[],
      dividas:JSON.parse(localStorage.getItem('mg2_dividas'))||DIVIDAS_PADRAO
    };
  }catch(e){
    return{salario:7200,gastos:GASTOS_PADRAO,cartoes:CARTOES_PADRAO,lancamentos:[],envelopes:ENVELOPES_PADRAO,historico:[],dividas:DIVIDAS_PADRAO};
  }
}

var dados=carregar();
var hoje=new Date().getDate();
var st={
  salario:dados.salario,
  gastos:dados.gastos,
  cartoes:dados.cartoes,
  lancamentos:dados.lancamentos,
  envelopes:dados.envelopes,
  historico:dados.historico,
  dividas:dados.dividas,
  aba:'inicio',
  formDivida:{nome:'',valorTotal:'',parcelaMensal:'',totalParcelas:'',diaVencimento:5},
  editDividaId:null,
  editDividaForm:{nome:'',valorTotal:'',parcelaMensal:'',totalParcelas:'',parcelaAtual:'',diaVencimento:5},
  ocultar:false,
  editSal:false,
  salTemp:dados.salario,
  formLanc:{descricao:'',valor:'',categoria:'alimentacao',pagamento:'dinheiro',cartaoId:1,parcelado:false,parcelas:'2'},
  formGasto:{descricao:'',valor:'',categoria:'moradia',dia:1},
  editGastoId:null,
  editGastoForm:{descricao:'',valor:'',categoria:'moradia',dia:1},
  editCartaoId:null,
  editCartaoForm:{nome:'',limite:'',diaVencimento:5},
  editEnv:null,
  envTemp:''
};

function fmt(v){
  if(st&&st.ocultar)return'R$ ••••';
  return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function catOptions(sel){
  var h='';
  Object.keys(CATS).forEach(function(k){
    h+='<option value="'+k+'"'+(sel===k?' selected':'')+'>'+CATS[k].emoji+' '+CATS[k].label+'</option>';
  });
  return h;
}

function diaOptions(sel){
  var h='';
  for(var d=1;d<=31;d++){h+='<option value="'+d+'"'+(sel===d?' selected':'')+'>Dia '+d+'</option>';}
  return h;
}

function getFaturaCartao(cartaoId){
  var total=0;
  st.lancamentos.forEach(function(l){
    if(l.pagamento==='cartao'&&l.cartaoId===cartaoId){
      total+=l.valorParcela||l.valor;
    }
  });
  return total;
}

function getGastoPorCategoria(){
  var map={};
  st.lancamentos.forEach(function(l){
    map[l.categoria]=(map[l.categoria]||0)+(l.valorParcela||l.valor);
  });
  return map;
}

function render(){
  var sal=st.salario;
  var gastos=st.gastos;
  var cartoes=st.cartoes;

  var totalFixosPagos=0,totalFixosPendentes=0;
  gastos.forEach(function(g){if(g.pago)totalFixosPagos+=g.valor;else totalFixosPendentes+=g.valor;});

  var totalLancamentos=0;
  st.lancamentos.forEach(function(l){totalLancamentos+=(l.valorParcela||l.valor);});

  var totalFaturasPagas=0,totalFaturasPendentes=0;
  cartoes.forEach(function(c){
    var fat=getFaturaCartao(c.id);
    if(c.faturaPaga)totalFaturasPagas+=fat;else totalFaturasPendentes+=fat;
  });

  var totalDividasPagas=0,totalDividasPendentes=0;
  st.dividas.forEach(function(d){
    if(d.pago)totalDividasPagas+=d.parcelaMensal;else totalDividasPendentes+=d.parcelaMensal;
  });

  var saldo=sal-totalFixosPagos-totalFaturasPagas-totalDividasPagas;
  var totalComprometido=totalFixosPagos+totalFixosPendentes+totalFaturasPagas+totalFaturasPendentes+totalDividasPagas+totalDividasPendentes;
  var pct=Math.min((totalComprometido/sal)*100,100);
  var sobra=sal-totalComprometido;

  var diasRestantesMes=30-hoje+1;
  var porDia=sobra>0?sobra/diasRestantesMes:0;

  var corSaldo=saldo>sal*0.3?'#00b894':saldo>0?'#fdcb6e':'#0e7c86';

  var headerRight='';
  if(st.editSal){
    headerRight='<div class="salary-edit" style="display:flex;align-items:center;gap:8px"><input class="salary-input" id="sal-input" type="number" value="'+st.salTemp+'" oninput="st.salTemp=parseFloat(this.value)"/><button class="salary-btn" onclick="confirmarSalario()">✓</button></div>';
  }else{
    headerRight='<div class="salary-display" onclick="editarSalario()"><div class="salary-label">Salário</div><div class="salary-value">'+fmt(sal)+'</div></div>';
  }

  var heroCard='<div class="hero-card">';
  heroCard+='<div class="hero-label">VOCÊ PODE GASTAR HOJE</div>';
  heroCard+='<div class="hero-value">'+fmt(porDia)+'</div>';
  heroCard+='<div class="hero-sub">Saldo total disponível: '+fmt(saldo)+'</div>';
  heroCard+='<div class="hero-bar"><div class="hero-bar-fill" style="width:'+pct+'%"></div></div>';
  heroCard+='<div class="hero-labels"><span>Comprometido: '+fmt(totalComprometido)+'</span><span>'+Math.round(pct)+'%</span></div>';
  var totalApagar=totalFixosPendentes+totalFaturasPendentes+totalDividasPendentes;
  if(totalApagar>0){
    heroCard+='<div class="hero-alert">⏳ '+fmt(totalApagar)+' em contas, faturas e dívidas ainda não pagas</div>';
  }
  heroCard+='</div>';

  var quickActions='<div class="quick-actions">';
  quickActions+='<button class="quick-btn primary" onclick="setAba(\'lancar\')"><span class="qi">➕</span>Lançar Gasto</button>';
  quickActions+='<button class="quick-btn secondary" onclick="document.getElementById(\'modal-virar\').style.display=\'flex\'"><span class="qi">🔄</span>Virar Mês</button>';
  quickActions+='</div>';

  var tabs='<div class="tabs">';

  tabs+='<button class="tab-btn '+(st.aba==='fixos'?'active':'inactive')+'" onclick="setAba(\'fixos\')">📋 Fixos</button>';
  tabs+='<button class="tab-btn '+(st.aba==='historico'?'active':'inactive')+'" onclick="setAba(\'historico\')">📆 Histór.</button>';
  tabs+='</div>';

  var abaHtml='';
  if(st.aba==='inicio')abaHtml=renderInicio();
  else if(st.aba==='lancar')abaHtml=renderLancar();
  else if(st.aba==='cartoes')abaHtml=renderCartoes();

  document.getElementById('app').innerHTML=

      '<div><div class="header-title">💰 Minha Grana</div><div class="header-sub">Dia '+hoje+' do mês</div></div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+

    '</div>'+
    '<div class="main">'+

function renderInicio(){
  var catMap=getGastoPorCategoria();
  var html='<div class="card"><div class="card-title">📊 Gastos por Categoria</div>';
  var temAlgum=false;
  Object.keys(CATS).forEach(function(k){
    var v=CATS[k];
    var gasto=catMap[k]||0;
    var limite=st.envelopes[k]||0;
    if(limite===0&&gasto===0)return;
    temAlgum=true;
    var pct=limite>0?Math.min((gasto/limite)*100,100):(gasto>0?100:0);
    var cor=pct>90?'#0e7c86':pct>60?'#fdcb6e':'#00b894';
    html+='<div class="cat-row">';
    html+='<div class="cat-header">';
    html+='<div class="cat-name"><div class="cat-emoji-bg" style="background:'+v.cor+'22">'+v.emoji+'</div>'+v.label+'</div>';
    html+='<div class="cat-vals" style="color:'+cor+'">'+fmt(gasto)+(limite>0?' / '+fmt(limite):'')+'</div>';
    html+='</div>';
    html+='<div class="cat-bar"><div class="cat-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>';
    html+='</div>';
  });
  if(!temAlgum)html+='<div class="empty-msg">Nenhum gasto lançado ainda este mês.<br>Toque em ➕ Lançar Gasto para começar!</div>';
  html+='</div>';

  if(st.lancamentos.length>0){
    html+='<div class="card"><div class="card-title">🧾 Todos os Lançamentos ('+st.lancamentos.length+')</div>';
    var ultimos=st.lancamentos.slice().reverse();
    ultimos.forEach(function(l){
      var cat=CATS[l.categoria]||CATS.outros;
      html+='<div class="lanc-item">';
      html+='<div class="lanc-icon" style="background:'+cat.cor+'22">'+cat.emoji+'</div>';
      html+='<div class="lanc-info"><div class="lanc-nome">'+l.descricao+'</div><div class="lanc-sub">'+(l.pagamento==='cartao'?'💳 '+(getCartaoNome(l.cartaoId))+(l.totalParcelas>1?' · Parcelado '+l.parcelaAtual+'/'+l.totalParcelas+'x':' · À vista'):'💵 Dinheiro/Pix')+'</div></div>';
      html+='<div class="lanc-valor">'+fmt(l.valorParcela||l.valor)+'</div>';
      html+='<button data-id="'+l.id+'" onclick="remLancamento(this.dataset.id)" class="lanc-del">✕</button>';
      html+='</div>';
    });
    html+='</div>';
  }

  return html;
}

function renderLancar(){
  var f=st.formLanc;
  var html='<div class="card"><div class="card-title">➕ Lançar Novo Gasto</div>';
  html+='<label class="form-label">O que você comprou?</label>';
  html+='<input class="form-input" placeholder="Ex: Mercado, Roupa, Combustível..." value="'+f.descricao+'" oninput="st.formLanc.descricao=this.value" />';
  html+='<label class="form-label mt">Valor (R$)</label>';
  html+='<input class="form-input" type="number" inputmode="decimal" placeholder="0,00" value="'+f.valor+'" oninput="st.formLanc.valor=this.value" />';
  html+='<label class="form-label mt">Categoria</label>';
  html+='<select class="form-input" onchange="st.formLanc.categoria=this.value">'+catOptions(f.categoria)+'</select>';

  html+='<label class="form-label mt">Como você pagou?</label>';
  html+='<div class="toggle-row">';
  html+='<div class="toggle-opt '+(f.pagamento==='dinheiro'?'active':'')+'" onclick="st.formLanc.pagamento=\'dinheiro\';render()">💵 Dinheiro/Pix</div>';
  html+='<div class="toggle-opt '+(f.pagamento==='cartao'?'active':'')+'" onclick="st.formLanc.pagamento=\'cartao\';render()">💳 Cartão</div>';
  html+='</div>';

  if(f.pagamento==='cartao'){
    html+='<label class="form-label mt">Qual cartão?</label>';
    html+='<div class="toggle-row">';
    st.cartoes.forEach(function(c){
      html+='<div class="toggle-opt '+(f.cartaoId===c.id?'active':'')+'" data-id="'+c.id+'" onclick="st.formLanc.cartaoId=parseInt(this.dataset.id);render()">'+c.nome+'</div>';
    });
    html+='</div>';

    html+='<label class="form-label mt">Forma</label>';
    html+='<div class="toggle-row">';
    html+='<div class="toggle-opt '+(!f.parcelado?'active':'')+'" onclick="st.formLanc.parcelado=false;render()">À vista</div>';
    html+='<div class="toggle-opt '+(f.parcelado?'active':'')+'" onclick="st.formLanc.parcelado=true;render()">Parcelado</div>';
    html+='</div>';

    if(f.parcelado){
      html+='<label class="form-label mt">Em quantas vezes?</label>';
      html+='<input class="form-input" type="number" inputmode="numeric" placeholder="Ex: 3" value="'+f.parcelas+'" oninput="st.formLanc.parcelas=this.value" />';

        var vp=parseFloat(f.valor)/parseInt(f.parcelas);
        html+='<div style="text-align:center;margin-top:8px;font-size:13px;color:#e17055;font-weight:700">'+parseInt(f.parcelas)+'x de '+fmt(vp)+'</div>';

  }

  html+='<button class="add-btn pink" onclick="addLancamento()">✓ Salvar Lançamento</button>';
  html+='</div>';
  return html;

function getCartaoNome(id){
  var c=st.cartoes.find(function(c){return c.id===id;});
  return c?c.nome:'Cartão';
}

    html+='<div class="cartao-card '+c.cor+'" style="color:'+corTxt+'">';

function confirmarVirarMes(){
  var meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var agora=new Date();
  var mesAnt=agora.getMonth()===0?11:agora.getMonth()-1;
  var anoAnt=agora.getMonth()===0?agora.getFullYear()-1:agora.getFullYear();
  var totalFixos=0;st.gastos.forEach(function(g){totalFixos+=g.valor;});
  var totalLanc=0;st.lancamentos.forEach(function(l){totalLanc+=(l.valorParcela||l.valor);});
  var sobra=st.salario-totalFixos-totalLanc;

  st.historico.push({
    nome:meses[mesAnt]+' '+anoAnt,
    data:agora.toLocaleDateString('pt-BR'),
    salario:st.salario,
    totalGastos:totalLanc,
    sobra:sobra
  });

  st.gastos=st.gastos.map(function(g){return Object.assign({},g,{pago:false});});

  // Reset faturas dos cartões
  st.cartoes=st.cartoes.map(function(c){return Object.assign({},c,{faturaPaga:false});});

  // Avança parcelas dos lançamentos de cartão, remove os que à vista ou última parcela
  st.lancamentos=st.lancamentos.filter(function(l){
    if(l.pagamento!=='cartao')return false; // remove lançamentos em dinheiro
    if(l.totalParcelas<=1)return false; // remove à vista
    l.parcelaAtual++;
    return l.parcelaAtual<=l.totalParcelas;
  });

  // Avança dívidas
  st.dividas=st.dividas.filter(function(d){
    d.pago=false;
    d.parcelaAtual++;
    return d.parcelaAtual<=d.totalParcelas;
  });

  salvar();
  document.getElementById('modal-virar').style.display='none';
  alert('✅ Mês virado! Histórico salvo.');
  render();
}

function exportarDados(){
  var d={salario:st.salario,gastos:st.gastos,cartoes:st.cartoes,lancamentos:st.lancamentos,envelopes:st.envelopes,historico:st.historico,exportadoEm:new Date().toLocaleString('pt-BR')};
  var json=JSON.stringify(d,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='minha-grana-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importarDados(){
  var input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.salario){alert('Arquivo inválido!');return;}
        if(!confirm('Isso vai substituir os dados atuais. Continuar?'))return;
        st.salario=d.salario;st.gastos=d.gastos||GASTOS_PADRAO;st.cartoes=d.cartoes||CARTOES_PADRAO;
        st.lancamentos=d.lancamentos||[];st.envelopes=d.envelopes||ENVELOPES_PADRAO;st.historico=d.historico||[];
        salvar();render();alert('✅ Dados restaurados!');
      }catch(err){alert('Erro ao importar.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

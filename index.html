function fmt(v){
  if(st&&st.ocultar)return'R$ ••••';
  return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

  var h='';

function getSaldoInvestido(){
  var saldo=0;
  st.investimentos.forEach(function(i){saldo+=(i.tipo==='saida'?-i.valor:i.valor);});
  return saldo;
}

function diaOptions(sel){
  var h='';
  for(var d=1;d<=31;d++){h+='<option value="'+d+'"'+(sel===d?' selected':'')+'>Dia '+d+'</option>';}
  return h;
}

function getFaturaCartao(cartaoId){
  // "Fatura atual (a pagar)": lançamentos já contabilizados e ainda não pagos nesta fatia
  var total=0;
  st.lancamentos.forEach(function(l){
    if(l.pagamento==='cartao'&&l.cartaoId===cartaoId&&l.contabilizado&&!l.faturaPaga){
      total+=l.valorParcela||l.valor;
    }
  });
  return total;
}

function getGastosCartaoProximoMes(cartaoId){
  // Compras feitas este ciclo, que só viram gasto variável (e fatura a pagar) no próximo mês
  var total=0;
  st.lancamentos.forEach(function(l){
    if(l.pagamento==='cartao'&&l.cartaoId===cartaoId&&!l.contabilizado){
      total+=l.valorParcela||l.valor;
    }
  });
  return total;
}

function getGastoPorCategoria(){
  var map={};
  st.lancamentos.forEach(function(l){
    if(l.pagamento==='cartao'&&!l.contabilizado)return; // ainda não conta no orçamento deste mês
    map[l.categoria]=(map[l.categoria]||0)+(l.valorParcela||l.valor);
  });
  st.gastos.forEach(function(g){
    if(g.pago){
      map[g.categoria]=(map[g.categoria]||0)+(g.valorReal!=null?g.valorReal:g.valor);
    }
  });
  st.dividas.forEach(function(d){
    if(d.pago){
      map[d.categoria]=(map[d.categoria]||0)+d.parcelaMensal;
    }
  });
  return map;
}

function render(){
  var sal=st.salario; // salário base (editável) — é a base FIXA de todo o orçamento 50/30/20/10
  var gastos=st.gastos;
  var cartoes=st.cartoes;

  var META_FIXOS=st.metasPct.fixos/100, META_VARIAVEL=st.metasPct.variavel/100, META_DIVIDAS=st.metasPct.dividas/100, META_INVEST=st.metasPct.invest/100;

  // Separa os gastos fixos "normais" dos gastos fixos de categoria investimentos
  var totalFixosPagos=0,totalFixosPendentes=0;
  var totalInvestFixoPagos=0,totalInvestFixoPendentes=0;
  gastos.forEach(function(g){
    var valorReal=(g.valorReal!=null)?g.valorReal:g.valor;
    if(g.categoria==='investimentos'){
      if(g.pago)totalInvestFixoPagos+=valorReal;else totalInvestFixoPendentes+=valorReal;
    }else{
      if(g.pago)totalFixosPagos+=valorReal;else totalFixosPendentes+=valorReal;
    }
  });

  var totalLancamentos=0,totalLancamentosDinheiro=0,totalLancamentosCartao=0,totalLancamentosCartaoContab=0;
  st.lancamentos.forEach(function(l){
    var v=(l.valorParcela||l.valor);
    totalLancamentos+=v;
    if(l.pagamento==='cartao'){
      totalLancamentosCartao+=v;
      if(l.contabilizado)totalLancamentosCartaoContab+=v;
    }else{
      totalLancamentosDinheiro+=v;
    }
  });
  var totalReceitas=0;
  st.receitas.forEach(function(r){totalReceitas+=r.valor;});
  var totalReceitasFixasPagas=0;
  var totalReceitasFixasPendentes=0;
  st.receitasFixas.forEach(function(r){if(r.pago)totalReceitasFixasPagas+=r.valor;else totalReceitasFixasPendentes+=r.valor;});
  var receitaTotal=sal+totalReceitasFixasPagas+totalReceitas;
  var receitaExtra=totalReceitasFixasPagas+totalReceitas; // tudo que não é o salário fixo

  // Faturas dos cartões temporariamente NÃO entram no cálculo do saldo
  var totalFaturasPagas=0,totalFaturasPendentes=0;

  // Dívidas normais (empréstimos de verdade) — faturas de cartão NÃO entram mais aqui, viraram parte do balde Variável
  var totalDividasPagas=0,totalDividasPendentes=0;
  st.dividas.forEach(function(d){
    if(d.pago)totalDividasPagas+=d.parcelaMensal;else totalDividasPendentes+=d.parcelaMensal;
  });

  // Quanto já foi pago de fatura de cartão neste ciclo (ação manual, por cartão)
  var totalFaturaCartaoPagaValor=0;
  st.cartoes.forEach(function(c){totalFaturaCartaoPagaValor+=(c.faturaPagaValor||0);});

  // Quanto ainda falta pagar de fatura de cartão (o que já está contabilizado no orçamento, mas ainda não foi pago de verdade)
  var totalFaturaCartaoAPagar=0;
  st.cartoes.forEach(function(c){totalFaturaCartaoAPagar+=getFaturaCartao(c.id);});

  // Saldo real = receita recebida - fixos pagos - investimento fixo pago - dívidas pagas - fatura de cartão paga - gastos em dinheiro/pix
  // (compras no cartão só saem do saldo quando você marca a fatura daquele cartão como paga, não na hora da compra)
  var saldo=receitaTotal-totalFixosPagos-totalInvestFixoPagos-totalDividasPagas-totalFaturaCartaoPagaValor-totalLancamentosDinheiro;

  // Total comprometido = tudo que está planejado (fixos + investimento fixo + dívidas normais) — cartão fica de fora daqui, mora no balde Variável
  var totalComprometido=totalFixosPagos+totalFixosPendentes+totalInvestFixoPagos+totalInvestFixoPendentes+totalDividasPagas+totalDividasPendentes;

  // A base de TODO o orçamento é sempre o salário fixo, nunca a receita variável
  var salBase=sal;
  var valorVariavelBucket=totalLancamentosDinheiro+totalLancamentosCartaoContab;
  var pct=salBase>0?Math.min(((totalComprometido+valorVariavelBucket)/salBase)*100,100):0;

  // Sobra = o que realmente sobra livre depois de tudo
  var sobra=receitaTotal-totalComprometido-valorVariavelBucket;

  var porDia=sobra>0?sobra/30:0;
  var porSemana=sobra>0?sobra/4:0;

  var corSaldo=saldo>salBase*0.3?'#00b894':saldo>0?'#fdcb6e':'#e74c3c';

  var headerRight='<div style="font-size:12px;color:#7fa8ab;text-align:right"><div style="font-weight:700;color:#1d4f72">'+fmt(receitaTotal)+'</div><div>receita do mês</div></div>';

  var valorFixos=totalFixosPagos+totalFixosPendentes;
  var valorDividas=totalDividasPagas+totalDividasPendentes;
  var valorInvest=totalInvestFixoPagos+totalInvestFixoPendentes;
  var valorReceitas=totalReceitasFixasPagas+totalReceitasFixasPendentes;
  var pctFixos=salBase>0?Math.round((valorFixos/salBase)*100):0;
  var pctDividas=salBase>0?Math.round((valorDividas/salBase)*100):0;
  var pctGastos=salBase>0?Math.round((valorVariavelBucket/salBase)*100):0;
  var pctInvest=salBase>0?Math.round((valorInvest/salBase)*100):0;

  function metaTag(pctAtual,metaPct){
    var metaExata=metaPct*100;
    var metaLabel=(metaExata%1===0)?metaExata:metaExata.toFixed(1).replace('.',',');
    var estourou=pctAtual>metaExata;
    return '<div style="font-size:9px;opacity:0.8;margin-top:3px">meta: '+metaLabel+'%'+(estourou?' ⚠️':'')+'</div>';
  }

  var heroCard='<div class="hero-card">';
  heroCard+='<div style="display:flex;justify-content:space-between;align-items:center"><div class="hero-label">PARA ONDE VAI SEU SALÁRIO</div><button onclick="st.editandoMetas=!st.editandoMetas;st.metasTemp=Object.assign({},st.metasPct);render()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:#fff;font-size:11px;padding:4px 8px;cursor:pointer">'+(st.editandoMetas?'✕':'✏️ metas')+'</button></div>';
  if(st.editandoMetas){
    var mt=st.metasTemp;
    var somaTemp=parseFloat(mt.fixos||0)+parseFloat(mt.variavel||0)+parseFloat(mt.dividas||0)+parseFloat(mt.invest||0);
    heroCard+='<div style="margin-top:10px">';
    heroCard+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
    [['fixos','Fixos'],['variavel','Variável'],['dividas','Dívidas'],['invest','Investimento']].forEach(function(par){
      heroCard+='<div style="flex:1;min-width:70px"><div style="font-size:10px;opacity:0.85;margin-bottom:4px">'+par[1]+'</div><input type="number" inputmode="decimal" data-campo="'+par[0]+'" value="'+mt[par[0]]+'" oninput="st.metasTemp[this.dataset.campo]=this.value" style="width:100%;padding:8px;border-radius:8px;border:none;background:rgba(255,255,255,0.9);color:#1f3a3d;font-size:13px;font-weight:700;text-align:center" /></div>';
    });
    heroCard+='</div>';
    heroCard+='<div style="font-size:11px;margin-top:8px;opacity:0.9">Soma: '+somaTemp+'% '+(Math.abs(somaTemp-100)<0.01?'✅':'⚠️ precisa somar 100%')+'</div>';
    heroCard+='<button onclick="salvarMetas()" style="width:100%;margin-top:10px;padding:10px;border:none;border-radius:12px;background:#fff;color:#1d4f72;font-weight:700;cursor:pointer">✓ Salvar Metas</button>';
    heroCard+='</div>';
    heroCard+='</div>'; // fecha hero-card
  }else{
  heroCard+='<div style="display:flex;gap:10px;margin-top:8px">';
  heroCard+='<div style="flex:1;text-align:center"><div style="font-size:26px;font-weight:900">'+pctFixos+'%</div><div style="font-size:10px;opacity:0.85;margin-top:2px">Gastos Fixos</div><div style="font-size:12px;font-weight:700;opacity:0.95;margin-top:3px">'+fmt(valorFixos)+'</div>'+metaTag(pctFixos,META_FIXOS)+'</div>';
  heroCard+='<div style="flex:1;text-align:center"><div style="font-size:26px;font-weight:900">'+pctDividas+'%</div><div style="font-size:10px;opacity:0.85;margin-top:2px">Dívidas</div><div style="font-size:12px;font-weight:700;opacity:0.95;margin-top:3px">'+fmt(valorDividas)+'</div>'+metaTag(pctDividas,META_DIVIDAS)+'</div>';
  heroCard+='<div style="flex:1;text-align:center"><div style="font-size:22px;font-weight:900">'+pctGastos+'%</div><div style="font-size:10px;opacity:0.85;margin-top:2px">Gastos Var.</div><div style="font-size:11px;font-weight:700;opacity:0.95;margin-top:3px">'+fmt(valorVariavelBucket)+'</div>'+metaTag(pctGastos,META_VARIAVEL)+'</div>';
  heroCard+='<div style="flex:1;text-align:center"><div style="font-size:22px;font-weight:900;color:#00cec9">'+pctInvest+'%</div><div style="font-size:10px;opacity:0.85;margin-top:2px">Investimento</div><div style="font-size:11px;font-weight:700;color:#00cec9;margin-top:3px">'+fmt(valorInvest)+'</div>'+metaTag(pctInvest,META_INVEST)+'</div>';
  if(totalReceitasFixasPendentes>0){heroCard+='<div class="hero-alert" style="background:rgba(0,184,148,0.2)">💚 '+fmt(totalReceitasFixasPendentes)+' em receitas ainda não recebidas</div>';}
  heroCard+='</div>';
  heroCard+='<div class="hero-sub" style="margin-top:14px">Comprometido: '+fmt(totalComprometido)+'</div>';
  var totalApagar=totalFixosPendentes+totalInvestFixoPendentes+totalFaturasPendentes+totalDividasPendentes+totalFaturaCartaoAPagar;
  if(totalApagar>0){
    var nomesPendentes=[];
    gastos.forEach(function(g){if(!g.pago)nomesPendentes.push(g.descricao+' ('+fmt(g.valorReal!=null?g.valorReal:g.valor)+')');});
    st.dividas.forEach(function(d){if(!d.pago)nomesPendentes.push(d.nome+' ('+fmt(d.parcelaMensal)+')');});
    st.cartoes.forEach(function(c){var fc=getFaturaCartao(c.id);if(fc>0)nomesPendentes.push('Fatura '+c.nome+' ('+fmt(fc)+')');});
    heroCard+='<div class="hero-alert">⏳ Ainda não pagos: '+nomesPendentes.join(', ')+'</div>';
  }
  heroCard+='<div class="hero-sub" style="margin-top:14px">Saldo total disponível: '+fmt(saldo)+'</div>';
  heroCard+='</div>';
  } // fim else (não editando metas)

  // Calcula semana atual e semanas restantes
  var semanas=[[1,7],[8,14],[15,21],[22,31]];
  var semAtualIdx=3;
  for(var si=0;si<semanas.length;si++){if(hoje>=semanas[si][0]&&hoje<=semanas[si][1]){semAtualIdx=si;break;}}
  var semanasRestantes=4-semAtualIdx; // inclui a semana atual

  // Gasto total de lançamentos
  var gastoTotal=0;
  st.lancamentos.forEach(function(l){gastoTotal+=(l.valorParcela||l.valor);});

  // Saldo livre real = sobra (que já descontou lançamentos)
  // sobra = receitaTotal - fixos - dividas - lancamentos
  var saldoLivreReal=saldo; // usa o mesmo "Saldo total disponível" do card principal (só desconta o que já foi pago de fato)
  var saldoDisponivelSemanas=Math.max(saldoLivreReal,0);

  // Quanto pode gastar por semana com o que SOBROU de verdade
  var porSemanaReal=semanasRestantes>0?saldoDisponivelSemanas/semanasRestantes:saldoDisponivelSemanas;
  var porDiaReal=saldoLivreReal>0?saldoLivreReal/30:0;

  // Gasto desta semana (para a barrinha)
  var gastoSemana=gastoTotal;
  var pctSemana=porSemana>0?Math.min((gastoSemana/porSemana)*100,100):0;
  var corSemana=pctSemana>=80?'#e74c3c':pctSemana>=50?'#fdcb6e':'rgba(255,255,255,0.3)';
  var corReal=porSemanaReal<=0?'#e74c3c':porSemanaReal<porSemana*0.5?'#fdcb6e':'rgba(255,255,255,0.9)';

  var sobraCard='<div class="mini-cards-row">';
  sobraCard+='<div class="mini-card-destaque semana"><div class="mini-card-destaque-emoji">📅</div>';

function renderInicio(){
  var catMap=getGastoPorCategoria();

  // Meta de gastos variáveis = fatia base do salário fixo + sobra dos outros baldes (se não estourados)
  var totalFixosPagos2=0,totalFixosPendentes2=0,totalInvestFixoPagos2=0,totalInvestFixoPendentes2=0;
  st.gastos.forEach(function(g){
    if(g.categoria==='investimentos'){
      if(g.pago)totalInvestFixoPagos2+=g.valor;else totalInvestFixoPendentes2+=g.valor;
    }else{
      if(g.pago)totalFixosPagos2+=g.valor;else totalFixosPendentes2+=g.valor;
    }
  });
  var totalDividasPagas2=0,totalDividasPendentes2=0;
  st.dividas.forEach(function(d){if(d.pago)totalDividasPagas2+=d.parcelaMensal;else totalDividasPendentes2+=d.parcelaMensal;});
  var valorFixos2=totalFixosPagos2+totalFixosPendentes2;
  var valorDividas2=totalDividasPagas2+totalDividasPendentes2;
  var valorInvest2=totalInvestFixoPagos2+totalInvestFixoPendentes2;

  var metaFixosR=st.salario*(st.metasPct.fixos/100);
  var metaDividasR=st.salario*(st.metasPct.dividas/100);
  var metaInvestR=st.salario*(st.metasPct.invest/100);
  var metaVariavelBase=st.salario*(st.metasPct.variavel/100);

  var sobraFixos=Math.max(metaFixosR-valorFixos2,0);
  var sobraDividas=Math.max(metaDividasR-valorDividas2,0);
  var sobraInvestBaldes=Math.max(metaInvestR-valorInvest2,0);
  var bonusVariavel=sobraFixos+sobraDividas+sobraInvestBaldes;
  var metaVariavel=metaVariavelBase+bonusVariavel;

  var totalAlocado=0;
  Object.keys(st.envelopes).forEach(function(k){totalAlocado+=(st.envelopes[k]||0);});
  var aindaFalta=metaVariavel-totalAlocado;

  var html='<div class="card">';
  html+='<div class="card-title">🎯 Distribuir Orçamento Variável entre Categorias</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  var pctVariavelLabel=(st.metasPct.variavel%1===0)?st.metasPct.variavel:st.metasPct.variavel.toFixed(1).replace('.',',');
  html+='<div style="flex:1;background:#dff0f2;border-radius:12px;padding:10px;text-align:center"><div style="font-size:9px;color:#7fa8ab;margin-bottom:3px">META VARIÁVEL ('+pctVariavelLabel+'%'+(bonusVariavel>0?' + sobra':'')+')</div><div style="font-size:15px;font-weight:800;color:#1d4f72">'+fmt(metaVariavel)+'</div></div>';
  html+='<div style="flex:1;background:#fdebe0;border-radius:12px;padding:10px;text-align:center"><div style="font-size:9px;color:#c9a594;margin-bottom:3px">JÁ DISTRIBUÍDO</div><div style="font-size:15px;font-weight:800;color:#e17055">'+fmt(totalAlocado)+'</div></div>';
  html+='<div style="flex:1;background:'+(aindaFalta<=0?'#e3f7f0':'#fef3e2')+';border-radius:12px;padding:10px;text-align:center"><div style="font-size:9px;color:'+(aindaFalta<=0?'#0e9c6f':'#d4a017')+';margin-bottom:3px">FALTA DIVIDIR</div><div style="font-size:15px;font-weight:800;color:'+(aindaFalta<=0?'#0e9c6f':'#d4a017')+'">'+fmt(aindaFalta)+'</div></div>';
  html+='</div>';
  if(bonusVariavel>0){
    html+='<div class="dica-box">💡 Base de '+fmt(metaVariavelBase)+' + '+fmt(bonusVariavel)+' de sobra (Fixos/Dívidas/Investimento não estourados)</div>';
  }
  html+='</div>';

  // Gastos variáveis = só lançamentos do dia a dia
  var catMapVariavel={};
  st.lancamentos.forEach(function(l){
    catMapVariavel[l.categoria]=(catMapVariavel[l.categoria]||0)+(l.valorParcela||l.valor);
  });

  html+='<div class="card"><div class="card-title">💰 Gastos Variáveis vs Meta</div>';
  var temGastoVariavel=false;
  Object.keys(CATS_BASE).forEach(function(k){
    var v=getCat(k);
    var gasto=catMapVariavel[k]||0;
    var limite=st.envelopes[k]||0;
    if(gasto===0&&limite===0)return;
    temGastoVariavel=true;
    var pct=limite>0?Math.min((gasto/limite)*100,100):0;
    var cor=pct>=80?'#e74c3c':pct>=50?'#fdcb6e':'#00b894';
    var isEdit=st.editEnv===k;
    html+='<div class="cat-row">';
    html+='<div class="cat-header">';
    html+='<div class="cat-name"><div class="cat-emoji-bg" style="background:'+v.cor+'22">'+v.emoji+'</div>'+v.label+'</div>';
    if(isEdit){
      html+='<div style="display:flex;align-items:center;gap:6px">';
      html+='<input class="env-input" type="number" inputmode="decimal" placeholder="Meta R$" value="'+st.envTemp+'" oninput="st.envTemp=this.value" style="width:90px;padding:6px 8px;border-radius:8px;border:1.5px solid #cdeaec;background:#f7fdfd;color:#1f3a3d;font-size:12px;outline:none" />';
      html+='<button data-key="'+k+'" onclick="salvarEnv(this.dataset.key)" style="background:#1d4f72;border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">✓</button>';
      html+='<button onclick="st.editEnv=null;render()" style="background:none;border:none;color:#a8d4d6;cursor:pointer;font-size:16px;padding:0 2px">✕</button>';
      html+='</div>';
    }else{
      html+='<div style="display:flex;align-items:center;gap:6px">';
      html+='<div class="cat-vals" style="color:'+cor+'">'+fmt(gasto)+(limite>0?' / '+fmt(limite):'')+'</div>';
      html+='<button data-key="'+k+'" onclick="st.editEnv=this.dataset.key;st.envTemp=\''+(limite||'')+'\';render()" style="background:none;border:none;color:#1d4f72;cursor:pointer;font-size:13px;padding:0;line-height:1">✏️</button>';
      html+='</div>';
    }
    html+='</div>';
    if(limite>0){
      html+='<div class="cat-bar"><div class="cat-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>';
    }
    html+='</div>';
  });
  // Mostra categorias sem gasto para definir metas
  var mostrar=st.mostrarTodasCats;
  if(mostrar){
    Object.keys(CATS_BASE).forEach(function(k){
      var v=getCat(k);
      var gasto=catMapVariavel[k]||0;
      var limite=st.envelopes[k]||0;
      if(gasto>0||limite>0)return; // ja mostrou acima
      var isEdit=st.editEnv===k;
      html+='<div class="cat-row" style="opacity:0.6">';
      html+='<div class="cat-header">';
      html+='<div class="cat-name"><div class="cat-emoji-bg" style="background:'+v.cor+'22">'+v.emoji+'</div>'+v.label+'</div>';
      if(isEdit){
        html+='<div style="display:flex;align-items:center;gap:6px">';
        html+='<input class="env-input" type="number" inputmode="decimal" placeholder="Meta R$" value="'+st.envTemp+'" oninput="st.envTemp=this.value" style="width:90px;padding:6px 8px;border-radius:8px;border:1.5px solid #cdeaec;background:#f7fdfd;color:#1f3a3d;font-size:12px;outline:none" />';
        html+='<button data-key="'+k+'" onclick="salvarEnv(this.dataset.key)" style="background:#1d4f72;border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">✓</button>';
        html+='<button onclick="st.editEnv=null;render()" style="background:none;border:none;color:#a8d4d6;cursor:pointer;font-size:16px;padding:0 2px">✕</button>';
        html+='</div>';
      }else{
        html+='<div style="display:flex;align-items:center;gap:6px">';
        html+='<div class="cat-vals" style="color:#a8d4d6">R$ 0,00 / sem meta</div>';
        html+='<button data-key="'+k+'" onclick="st.editEnv=this.dataset.key;st.envTemp=\'\';render()" style="background:none;border:none;color:#1d4f72;cursor:pointer;font-size:13px;padding:0;line-height:1">✏️</button>';
        html+='</div>';
      }
      html+='</div></div>';
    });
  }
  if(!temGastoVariavel&&!mostrar){
    html+='<div class="empty-msg" style="padding:14px">Nenhum gasto variável ainda.<br>Toque em ➕ Lançar Gasto para começar!</div>';
  }
  html+='<div style="text-align:center;margin-top:8px">';
  html+='<button onclick="st.mostrarTodasCats=!st.mostrarTodasCats;render()" style="background:none;border:none;color:#1d4f72;cursor:pointer;font-size:12px;font-weight:700;padding:4px">'+( mostrar?'▲ Ocultar categorias sem gasto':'▼ Ver todas as categorias e definir metas' )+'</button>';
  html+='</div>';
  html+='</div>';

  return html;
}

    '<div style="font-size:22px">📥</div>'+
    '<div><div style="font-weight:800;font-size:13px">Importar Extrato</div><div style="font-size:11px;opacity:0.85">Excel ou CSV do banco/cartão</div></div>'+

      html+='<div class="lanc-valor" style="color:#00b894">+'+fmt(r.valor)+'</div>';
      html+='<button data-id="'+r.id+'" onclick="editarReceita(this.dataset.id)" style="background:none;border:none;color:#1d4f72;cursor:pointer;font-size:14px;padding:4px">✏️</button>';
      html+='<button data-id="'+r.id+'" onclick="remReceita(this.dataset.id)" class="lanc-del">✕</button>';

}

  'aplicacao rdb':'investimentos','fundo de investimento':'investimentos','previdencia':'investimentos'
};
function sugerirCategoria(desc){
  var d=(desc||'').toLowerCase();
  for(var k in PALAVRAS_CAT){
    var esc=k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    var re=new RegExp('(^|[^a-zà-ÿ0-9])'+esc+'([^a-zà-ÿ0-9]|$)','i');
    if(re.test(d))return PALAVRAS_CAT[k];
  }
  return 'outros';
}

function carregarXLSX(callback){
  if(window.XLSX){callback();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){callback();};
  s.onerror=function(){alert('Não consegui carregar o suporte a Excel. Verifique sua internet e tente de novo.');};
  document.head.appendChild(s);
}

function importarExtrato(){
  var input=document.getElementById('import-file-input');
  if(input)input.click();
}

function onArquivoExtratoSelecionado(e){
  var file=e.target.files[0];
  if(!file){return;}
  carregarXLSX(function(){
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var wb=XLSX.read(data,{type:'array',cellDates:true});
        var todasPlanilhas=wb.SheetNames.map(function(nome){
          return XLSX.utils.sheet_to_json(wb.Sheets[nome],{header:1,raw:true,defval:''});
        });
        processarPlanilhaExtrato(todasPlanilhas);
      }catch(err){alert('Não consegui ler esse arquivo. Confira se é um Excel (.xlsx) ou CSV válido exportado do banco/cartão.');}
    };
    reader.readAsArrayBuffer(file);
  });
  e.target.value='';
}

function acharColuna(headers,palavras){
  for(var i=0;i<headers.length;i++){
    var h=String(headers[i]).toLowerCase();
    for(var j=0;j<palavras.length;j++){
      if(h.indexOf(palavras[j])!==-1)return i;
    }
  }
  return -1;
}

function pareceExtratoBancario(todasPlanilhas){
  var amostra=todasPlanilhas.map(function(rows){
    return rows.slice(0,25).map(function(r){return r.join(' ');}).join(' ');
  }).join(' ').toLowerCase();
  return amostra.indexOf('movimenta')>-1||amostra.indexOf('saldo do dia')>-1||amostra.indexOf('total de entradas')>-1||amostra.indexOf('total de saídas')>-1||amostra.indexOf('total de saidas')>-1;
}

var MESES_PT={'jan':1,'fev':2,'mar':3,'abr':4,'mai':5,'jun':6,'jul':7,'ago':8,'set':9,'out':10,'nov':11,'dez':12};
var PALAVRAS_TRANSACAO_ENTRADA=['transferência recebida','transferencia recebida','reembolso recebido','pix recebido','rendimento recebido','depósito','deposito','resgate'];
var PALAVRAS_TRANSACAO_SAIDA=['transferência enviada','transferencia enviada','compra no crédito','compra no débito','compra no credito','compra no debito','pagamento de boleto','pagamento efetuado','pix enviado','aplicação','aplicacao','saque','tarifa'];

function detectarTipoTransacao(textoLower){
  for(var i=0;i<PALAVRAS_TRANSACAO_ENTRADA.length;i++){if(textoLower.indexOf(PALAVRAS_TRANSACAO_ENTRADA[i])===0)return'entrada';}
  for(var i=0;i<PALAVRAS_TRANSACAO_SAIDA.length;i++){if(textoLower.indexOf(PALAVRAS_TRANSACAO_SAIDA[i])===0)return'saida';}
  return null;
}

var PALAVRAS_INVEST_APORTE=['aplicação','aplicacao','rdb','cdb','tesouro'];
var PALAVRAS_INVEST_RESGATE=['resgate'];
function ehMovimentoInvestimento(textoLower){
  for(var i=0;i<PALAVRAS_INVEST_APORTE.length;i++){if(textoLower.indexOf(PALAVRAS_INVEST_APORTE[i])===0)return'aporte';}
  for(var i=0;i<PALAVRAS_INVEST_RESGATE.length;i++){if(textoLower.indexOf(PALAVRAS_INVEST_RESGATE[i])===0)return'resgate';}
  return null;
}

function extrairValorFinal(texto){
  var m=texto.match(/(-?\d{1,3}(?:\.\d{3})*,\d{2})\s*$/);
  if(!m)return null;
  return{valor:parseValorCelula(m[1]),descricao:texto.slice(0,m.index).trim().replace(/[\s\-–]+$/,'')};
}

function limparDescricaoExtrato(descOriginal){
  var d=descOriginal;
  PALAVRAS_TRANSACAO_ENTRADA.concat(PALAVRAS_TRANSACAO_SAIDA).forEach(function(p){
    d=d.replace(new RegExp('^'+p,'i'),'');
  });
  d=d.replace(/^\s*pelo pix\s*/i,'').trim();
  d=d.replace(/^\s*efetuado\s*/i,'').trim();
  var idx=d.indexOf(' - ');
  if(idx>10)d=d.slice(0,idx);
  d=d.trim();
  if(!d)d=descOriginal.trim();
  return d||'(sem descrição)';
}

function parseExtratoFormatado(todasPlanilhas){
  var currentDate=new Date().toLocaleDateString('pt-BR');
  var out=[];
  todasPlanilhas.forEach(function(rows){
    rows.forEach(function(row){
      var dateCell=null,numCell=null,textParts=[];
      row.forEach(function(c){
        if(c===null||c===undefined||String(c).trim()==='')return;
        if(c instanceof Date){dateCell=c;return;}
        if(typeof c==='number'){numCell=c;return;}
        textParts.push(String(c));
      });
      if(dateCell){currentDate=dateCell.toLocaleDateString('pt-BR');}
      var texto=textParts.join(' ').replace(/\s+/g,' ').trim();
      if(!texto)return;
      var m=texto.match(/^(\d{1,2})\s+([a-zçA-ZÇ]{3})\s+(\d{4})/);
      if(m&&MESES_PT[m[2].toLowerCase()]){
        var dd=('0'+m[1]).slice(-2),mm=('0'+MESES_PT[m[2].toLowerCase()]).slice(-2);
        currentDate=dd+'/'+mm+'/'+m[3];
      }
      var textoLower=texto.toLowerCase();
      var tipo=detectarTipoTransacao(textoLower);
      if(!tipo)return;
      var valor,descBruta;
      if(numCell!==null){valor=numCell;descBruta=texto;}
      else{
        var extr=extrairValorFinal(texto);
        if(!extr)return;
        valor=extr.valor;descBruta=extr.descricao;
      }
      if(isNaN(valor)||valor===0)return;
      var desc=limparDescricaoExtrato(descBruta);
      var categoria=tipo==='saida'?sugerirCategoria(desc):'outros_rec';
      var movInvest=ehMovimentoInvestimento(textoLower);
      out.push({sel:true,data:currentDate,descricao:desc,valor:Math.abs(valor),tipo:tipo,categoria:categoria,subcategoria:'',investimento:!!movInvest,categoriaInvest:movInvest||'aporte'});
    });
  });
  return out;
}

function processarPlanilhaExtrato(todasPlanilhas){
  if(pareceExtratoBancario(todasPlanilhas)){
    st.importModoExtrato=true;
    st.importParsed=parseExtratoFormatado(todasPlanilhas);
    st.aba='importarRevisar';
    render();
    return;
  }
  st.importModoExtrato=false;
  var rows=todasPlanilhas[0].filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
  if(rows.length<2){alert('Não encontrei dados nessa planilha.');return;}
  var headers=rows[0].map(function(h){return String(h).trim();});
  var body=rows.slice(1);
  var idxData=acharColuna(headers,['data','date','dt']);
  var idxDesc=acharColuna(headers,['descri','histor','lancamento','lançamento','memo','detalhe','estabelecimento']);
  var idxValor=acharColuna(headers,['valor','amount','value','montante']);
  st.importHeaders=headers;
  st.importRows=body;
  st.importMap={data:idxData,descricao:idxDesc,valor:idxValor};
  if(idxData>-1&&idxDesc>-1&&idxValor>-1){
    montarImportParsed();
    st.aba='importarRevisar';
  }else{
    st.aba='importarMapear';
  }
  render();
}

function parseValorCelula(v){
  if(typeof v==='number')return v;
  if(!v)return NaN;
  var s=String(v).trim().replace(/[^0-9,.\-]/g,'');
  if(s.indexOf(',')>-1&&s.indexOf('.')>-1){
    if(s.lastIndexOf(',')>s.lastIndexOf('.')){s=s.replace(/\./g,'').replace(',','.');}
    else{s=s.replace(/,/g,'');}
  }else if(s.indexOf(',')>-1){
    s=s.replace(',','.');
  }
  return parseFloat(s);
}

function formatarDataCelula(v){
  if(!v)return new Date().toLocaleDateString('pt-BR');
  if(v instanceof Date)return v.toLocaleDateString('pt-BR');
  var s=String(v).trim();
  var m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){
    var dd=('0'+m[1]).slice(-2),mm=('0'+m[2]).slice(-2),yy=m[3];
    if(yy.length===2)yy='20'+yy;
    return dd+'/'+mm+'/'+yy;
  }
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){return ('0'+m[3]).slice(-2)+'/'+('0'+m[2]).slice(-2)+'/'+m[1];}
  return s||new Date().toLocaleDateString('pt-BR');
}

function montarImportParsed(){
  var map=st.importMap;
  var out=[];
  st.importRows.forEach(function(row){
    var valorNum=parseValorCelula(row[map.valor]);
    if(isNaN(valorNum)||valorNum===0)return;
    var tipo=valorNum<0?'saida':'entrada';
    var desc=String(row[map.descricao]||'').trim()||'(sem descrição)';
    var data=formatarDataCelula(row[map.data]);
    var categoria=tipo==='saida'?sugerirCategoria(desc):'outros_rec';
    var movInvest=ehMovimentoInvestimento(desc.toLowerCase());
    out.push({sel:true,data:data,descricao:desc,valor:Math.abs(valorNum),tipo:tipo,categoria:categoria,subcategoria:'',investimento:!!movInvest,categoriaInvest:movInvest||'aporte'});
  });
  st.importParsed=out;
}

function confirmarMapeamentoImportacao(){
  var map=st.importMap;
  if(map.data<0||map.descricao<0||map.valor<0){alert('Selecione as três colunas antes de continuar!');return;}
  montarImportParsed();
  st.aba='importarRevisar';render();
}

  html+='</div>';
  return html;
}

function jaExisteGasto(t){
  return st.lancamentos.some(function(x){return x.descricao===t.descricao&&Math.abs((x.valorParcela||x.valor)-t.valor)<0.005&&x.dataImportada===t.data;});
}
function jaExisteReceita(t){
  return st.receitas.some(function(x){return x.descricao===t.descricao&&Math.abs(x.valor-t.valor)<0.005&&x.data===t.data;});
}
function jaExisteInvestimento(t){
  return st.investimentos.some(function(x){return x.descricao===t.descricao&&Math.abs(x.valor-t.valor)<0.005&&x.data===t.data;});
}

function confirmarImportacaoExtrato(){
  var selecionados=st.importParsed.filter(function(t){return t.sel;});
  if(selecionados.length===0){alert('Selecione ao menos um lançamento!');return;}
  var novosGastos=0,novasReceitas=0,novosInvest=0,duplicados=0;
  selecionados.forEach(function(t){
    if(t.investimento){
      if(jaExisteInvestimento(t)){duplicados++;return;}
      // dinheiro saindo da conta (saida) = aporte (entra no investimento); dinheiro voltando (entrada) = resgate (sai do investimento)
      var tipoInvest=t.tipo==='saida'?'entrada':'saida';
      st.investimentos.push({id:Date.now()+Math.floor(Math.random()*1000),descricao:t.descricao,valor:t.valor,tipo:tipoInvest,categoria:t.categoriaInvest||(tipoInvest==='entrada'?'aporte':'resgate'),subcategoria:'',data:t.data});
      novosInvest++;
    }else if(t.tipo==='saida'){
      if(jaExisteGasto(t)){duplicados++;return;}
      st.lancamentos.push({id:Date.now()+Math.floor(Math.random()*1000),descricao:t.descricao,valor:t.valor,valorParcela:t.valor,categoria:t.categoria,subcategoria:t.subcategoria||'',pagamento:'dinheiro',dataImportada:t.data});
      novosGastos++;
    }else{
      if(jaExisteReceita(t)){duplicados++;return;}
      st.receitas.push({id:Date.now()+Math.floor(Math.random()*1000),descricao:t.descricao,valor:t.valor,categoria:t.categoria,subcategoria:t.subcategoria||'',data:t.data});
      novasReceitas++;
    }
  });
  st.importHeaders=[];st.importRows=[];st.importMap={data:-1,descricao:-1,valor:-1};st.importParsed=[];st.importModoExtrato=false;
  salvar();
  st.aba='lancamentos';
  render();
  alert('✅ Importação concluída!\n'+novosGastos+' gasto(s), '+novasReceitas+' receita(s) e '+novosInvest+' movimento(s) de investimento adicionados'+(duplicados>0?'.\n'+duplicados+' ignorado(s) por já existir(em).':'.'));
}

function getCartaoNome(id){

function addDivida(){
  var d=st.formDivida;
  if(!d.nome.trim()||!d.valorTotal||!d.totalParcelas){alert('Preencha tudo!');return;}
  var vt=parseFloat(d.valorTotal),np=parseInt(d.totalParcelas);
  st.dividas.push({id:Date.now(),pago:false,nome:d.nome.trim(),valorTotal:vt,parcelaMensal:vt/np,totalParcelas:np,parcelaAtual:1,diaVencimento:d.diaVencimento,categoria:d.categoria||'outros',formaPagamento:d.formaPagamento||'boleto'});
  st.formDivida={nome:'',valorTotal:'',parcelaMensal:'',totalParcelas:'',diaVencimento:5,categoria:'outros',formaPagamento:'boleto'};
  st.novaDividaAberta=false;
  salvar();render();
}

function remDivida(id){
  id=parseInt(id);
  if(!confirm('Remover esta dívida?'))return;
  st.dividas=st.dividas.filter(function(d){return d.id!==id;});
  salvar();render();
}

function toggleDividaPaga(id){
  id=parseInt(id);
  var idx=-1;for(var i=0;i<st.dividas.length;i++){if(st.dividas[i].id===id){idx=i;break;}}
  if(idx===-1)return;
  st.dividas[idx].pago=!st.dividas[idx].pago;
  salvar();render();
}

function editarDivida(id){
  id=parseInt(id);
  var d=st.dividas.find(function(d){return d.id===id;});
  if(!d)return;
  st.editDividaId=id;
  st.editDividaForm={nome:d.nome,valorTotal:d.valorTotal,parcelaMensal:d.parcelaMensal,totalParcelas:d.totalParcelas,parcelaAtual:d.parcelaAtual,diaVencimento:d.diaVencimento,categoria:d.categoria||'outros',formaPagamento:d.formaPagamento||'boleto'};
  render();
}

function salvarEdicaoDivida(id){
  id=parseInt(id);
  var ed=st.editDividaForm;
  if(!ed.nome.trim()||!ed.valorTotal||!ed.totalParcelas){alert('Preencha tudo!');return;}
  var idx=-1;for(var i=0;i<st.dividas.length;i++){if(st.dividas[i].id===id){idx=i;break;}}
  if(idx===-1)return;
  var vt=parseFloat(ed.valorTotal),np=parseInt(ed.totalParcelas),pa=parseInt(ed.parcelaAtual);
  st.dividas[idx]=Object.assign({},st.dividas[idx],{nome:ed.nome.trim(),valorTotal:vt,parcelaMensal:vt/np,totalParcelas:np,parcelaAtual:pa,diaVencimento:parseInt(ed.diaVencimento),categoria:ed.categoria||'outros',formaPagamento:ed.formaPagamento||'boleto'});
  st.editDividaId=null;
  salvar();render();
}

function gerarLinhaDoTempo(extras){
  extras=extras||{};
  var lancamentosExtras=extras.lancamentos||[];
  var dividasExtras=extras.dividas||[];
  var lancamentosTodos=st.lancamentos.concat(lancamentosExtras);
  var dividasTodas=st.dividas.concat(dividasExtras);

  var meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var hoje=new Date();
  var anoAtual=hoje.getFullYear();
  var mesAtual=hoje.getMonth(); // 0-indexed
  var totalMeses=(12-mesAtual)+12; // até dezembro deste ano + ano que vem inteiro

  var gastosFixosMensal=0,investimentoFixoMensal=0;
  st.gastos.forEach(function(g){
    if(g.categoria==='investimentos')investimentoFixoMensal+=g.valor;
    else gastosFixosMensal+=g.valor;
  });
  var rendaMensal=st.salario;
  st.receitasFixas.forEach(function(r){rendaMensal+=r.valor;});

  var linha=[];
  for(var i=0;i<totalMeses;i++){
    var mesIdx=(mesAtual+i)%12;
    var anoIdx=anoAtual+Math.floor((mesAtual+i)/12);

    var dividasDoMes=[];
    dividasTodas.forEach(function(d){
      var restantes=d.totalParcelas-d.parcelaAtual+1;
      if(i<restantes){
        dividasDoMes.push({nome:d.nome,valor:d.parcelaMensal,parcela:(d.parcelaAtual+i)+'/'+d.totalParcelas,simulado:!!d.simulado});
      }
    });

    var faturasCartaoDoMes={}; // cartaoId -> total
    var faturasCartaoSimulado={}; // cartaoId -> tem algo simulado?
    lancamentosTodos.forEach(function(l){
      if(l.pagamento!=='cartao')return;
      var v=0;
      if(l.totalParcelas>1){
        var restantes=l.totalParcelas-l.parcelaAtual+1;
        if(i<restantes)v=l.valorParcela;
      }else{
        var mesDevido=l.contabilizado?0:1;
        if(i===mesDevido)v=(l.valorParcela||l.valor);
      }
      if(v>0){
        faturasCartaoDoMes[l.cartaoId]=(faturasCartaoDoMes[l.cartaoId]||0)+v;
        if(l.simulado)faturasCartaoSimulado[l.cartaoId]=true;
      }
    });
    var faturasCartaoLista=[];
    Object.keys(faturasCartaoDoMes).forEach(function(cid){
      faturasCartaoLista.push({cartaoNome:getCartaoNome(parseInt(cid)),valor:faturasCartaoDoMes[cid],simulado:!!faturasCartaoSimulado[cid]});
    });

    var totalDividas=0;dividasDoMes.forEach(function(d){totalDividas+=d.valor;});
    var totalFaturasCartao=0;faturasCartaoLista.forEach(function(f){totalFaturasCartao+=f.valor;});

    var comprometido=gastosFixosMensal+investimentoFixoMensal+totalDividas+totalFaturasCartao;
    var sobra=rendaMensal-comprometido;

    linha.push({
      label:meses[mesIdx]+' '+anoIdx,
      atual:i===0,
      renda:rendaMensal,
      gastosFixos:gastosFixosMensal,
      investimentoFixo:investimentoFixoMensal,
      dividas:dividasDoMes,
      faturasCartao:faturasCartaoLista,
      totalDividas:totalDividas,
      totalFaturasCartao:totalFaturasCartao,
      comprometido:comprometido,
      sobra:sobra
    });
  }
  return linha;
}

      html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span>📋 Gastos fixos</span><span style="font-weight:700;color:#e17055">-'+fmt(m.gastosFixos)+'</span></div>';
      if(m.investimentoFixo>0){

      }

        });

      if(m.faturasCartao.length>0){

        m.faturasCartao.forEach(function(f){
          html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>💳 '+f.cartaoNome+'</span><span style="font-weight:700;color:#e17055">-'+fmt(f.valor)+'</span></div>';
        });
      }
      if(m.dividas.length===0&&m.faturasCartao.length===0){

  var html='';
  if(st.simulacaoAtiva){
    html+='<div class="card" style="background:linear-gradient(135deg,#a56cd6,#7c4fb0);color:#fff">';

function simularCompra(){
  var s=st.simForm;
  if(!s.descricao.trim()||!s.valor){alert('Preencha descrição e valor!');return;}
  var valor=parseFloat(s.valor);
  var np=parseInt(s.parcelas)||1;
  var extras={lancamentos:[],dividas:[]};

  if(s.tipo==='cartao'){
    if(s.parcelado){
      extras.lancamentos.push({descricao:s.descricao,valor:valor,valorParcela:valor/np,categoria:'outros',pagamento:'cartao',cartaoId:s.cartaoId,parcelaAtual:1,totalParcelas:np,contabilizado:false,simulado:true});
    }else{
      extras.lancamentos.push({descricao:s.descricao,valor:valor,valorParcela:valor,categoria:'outros',pagamento:'cartao',cartaoId:s.cartaoId,parcelaAtual:1,totalParcelas:1,contabilizado:false,simulado:true});
    }
  }else{
    extras.dividas.push({nome:s.descricao,valorTotal:valor,parcelaMensal:valor/np,totalParcelas:np,parcelaAtual:1,pago:false,simulado:true});
  }

  st.simulacaoAtiva=extras;
  st.simulacaoDescricao=s.descricao+' ('+fmt(valor)+(np>1?' em '+np+'x':' à vista')+')';
  st.simExpandido=false;
  render();
}

function pagarFaturaCartao(cartaoId){
  cartaoId=parseInt(cartaoId);
  var valor=getFaturaCartao(cartaoId);
  if(valor<=0)return;
  if(!confirm('Marcar fatura de '+fmt(valor)+' como paga? Isso vai descontar do seu Saldo Disponível.'))return;
  var idx=-1;for(var i=0;i<st.cartoes.length;i++){if(st.cartoes[i].id===cartaoId){idx=i;break;}}
  if(idx===-1)return;
  st.cartoes[idx].faturaPagaValor=(st.cartoes[idx].faturaPagaValor||0)+valor;
  // à vista: já cumpriu seu papel (contou + foi pago), pode sair da lista.
  // parcelado: precisa continuar existindo pras parcelas futuras, só marca esta fatia como paga.
  st.lancamentos=st.lancamentos.filter(function(l){
    if(!(l.pagamento==='cartao'&&l.cartaoId===cartaoId&&l.contabilizado&&!l.faturaPaga))return true;
    if(l.totalParcelas<=1)return false; // remove à vista
    l.faturaPaga=true; // mantém o parcelado, só marca esta fatia como paga
    return true;
  });
  salvar();render();
}

function addLancamento(){
  var f=st.formLanc;
  if(!f.descricao.trim()||!f.valor){alert('Preencha descrição e valor!');return;}
  var valor=parseFloat(f.valor);

  if(st.editandoLancamentoId){
    var l=st.lancamentos.find(function(x){return x.id===st.editandoLancamentoId;});
    if(l){
      l.descricao=f.descricao.trim();
      l.categoria=f.categoria;
      l.subcategoria=f.subcategoria||'';
      l.pagamento=f.pagamento;
      if(f.pagamento==='cartao'){
        l.cartaoId=f.cartaoId;
        if(f.parcelado){
          var np2=parseInt(f.parcelas)||1;
          l.valor=valor;l.valorParcela=valor/np2;l.totalParcelas=np2;l.parcelaAtual=l.parcelaAtual||1;
        }else{
          l.valor=valor;l.valorParcela=valor;l.totalParcelas=1;l.parcelaAtual=1;
        }
      }else{
        delete l.cartaoId;
        l.valor=valor;l.valorParcela=valor;l.totalParcelas=1;l.parcelaAtual=1;
      }
    }
    st.editandoLancamentoId=null;
    st.formLanc={descricao:'',valor:'',categoria:'alimentacao',subcategoria:'',categoriaReceita:'salario',subcategoriaReceita:'',pagamento:'dinheiro',cartaoId:1,parcelado:false,parcelas:'2',tipo:'saida',gastoFixoVinculado:''};
    salvar();st.aba='lancamentos';render();
    return;
  }

  if(st.editandoReceitaId){
    var r=st.receitas.find(function(x){return x.id===st.editandoReceitaId;});
    if(r){
      r.descricao=f.descricao.trim();
      r.valor=valor;
      r.categoria=f.categoriaReceita||'outros_rec';
      r.subcategoria=f.subcategoriaReceita||'';
    }
    st.editandoReceitaId=null;
    st.formLanc={descricao:'',valor:'',categoria:'alimentacao',subcategoria:'',categoriaReceita:'salario',subcategoriaReceita:'',pagamento:'dinheiro',cartaoId:1,parcelado:false,parcelas:'2',tipo:'saida',gastoFixoVinculado:''};
    salvar();st.aba='lancamentos';render();
    return;
  }

  if(f.tipo==='entrada'){
    st.receitas.push({id:Date.now(),descricao:f.descricao.trim(),valor:valor,categoria:f.categoriaReceita||'outros_rec',subcategoria:f.subcategoriaReceita||'',data:new Date().toLocaleDateString('pt-BR')});
    st.formLanc={descricao:'',valor:'',categoria:'alimentacao',subcategoria:'',categoriaReceita:'salario',subcategoriaReceita:'',pagamento:'dinheiro',cartaoId:1,parcelado:false,parcelas:'2',tipo:'entrada',gastoFixoVinculado:''};
  }else{
    var valorFinal=valor;
    var vinculoMsg='';
    if(f.gastoFixoVinculado){
      var gastoFixo=st.gastos.find(function(g){return g.id===parseInt(f.gastoFixoVinculado);});
      if(gastoFixo){
        var jaGasto=gastoFixo.valorReal!=null?gastoFixo.valorReal:0;
        var restante=Math.max(gastoFixo.valor-jaGasto,0);
        var absorvido=Math.min(valor,restante);
        var excedente=valor-absorvido;
        gastoFixo.valorReal=jaGasto+absorvido;
        if(gastoFixo.valorReal>=gastoFixo.valor)gastoFixo.pago=true;
        f.categoria=gastoFixo.categoria;
        valorFinal=excedente;
        vinculoMsg='✅ '+fmt(absorvido)+' abatido de "'+gastoFixo.descricao+'"'+(excedente>0?' — sobrou '+fmt(excedente)+' como gasto variável (passou do orçado).':' — dentro do orçamento, nada virou gasto variável.');
      }
    }
    if(valorFinal>0){
      if(f.pagamento==='cartao'&&f.parcelado){
        var np=parseInt(f.parcelas)||1;
        st.lancamentos.push({id:Date.now(),descricao:f.descricao.trim(),valor:valorFinal,valorParcela:valorFinal/np,categoria:f.categoria,subcategoria:f.subcategoria||'',pagamento:'cartao',cartaoId:f.cartaoId,parcelaAtual:1,totalParcelas:np,contabilizado:false});
      }else if(f.pagamento==='cartao'){
        st.lancamentos.push({id:Date.now(),descricao:f.descricao.trim(),valor:valorFinal,valorParcela:valorFinal,categoria:f.categoria,subcategoria:f.subcategoria||'',pagamento:'cartao',cartaoId:f.cartaoId,parcelaAtual:1,totalParcelas:1,contabilizado:false});
      }else{
        st.lancamentos.push({id:Date.now(),descricao:f.descricao.trim(),valor:valorFinal,valorParcela:valorFinal,categoria:f.categoria,subcategoria:f.subcategoria||'',pagamento:'dinheiro'});
      }
    }
    st.formLanc={descricao:'',valor:'',categoria:'alimentacao',subcategoria:'',categoriaReceita:'salario',subcategoriaReceita:'',pagamento:'dinheiro',cartaoId:1,parcelado:false,parcelas:'2',tipo:'saida',gastoFixoVinculado:''};
    if(vinculoMsg)alert(vinculoMsg);
  }
  salvar();st.aba=(f.tipo==='entrada'?'inicio':'lancamentos');render();
}

function confirmarVirarMes(){
  var meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var agora=new Date();
  var mesAnt=agora.getMonth()===0?11:agora.getMonth()-1;
  var anoAnt=agora.getMonth()===0?agora.getFullYear()-1:agora.getFullYear();
  var totalFixos=0;st.gastos.forEach(function(g){totalFixos+=g.valor;});
  var totalLanc=0;st.lancamentos.forEach(function(l){totalLanc+=(l.valorParcela||l.valor);});
  var sobra=st.salario-totalFixos-totalLanc;

  st.historico.push({
    nome:meses[mesAnt]+' '+anoAnt,
    data:agora.toLocaleDateString('pt-BR'),
    salario:st.salario,
    totalGastos:totalLanc,
    sobra:sobra
  });

  st.gastos=st.gastos.map(function(g){return Object.assign({},g,{pago:false,aporteGeradoId:null,valorReal:null});});
  st.receitasFixas=st.receitasFixas.map(function(r){return Object.assign({},r,{pago:false});});
  st.receitas=[];

  // Reset faturas dos cartões (o valor pago neste ciclo zera para o novo ciclo)
  st.cartoes=st.cartoes.map(function(c){return Object.assign({},c,{faturaPaga:false,faturaPagaValor:0});});

  // Marca como "contabilizado" tudo que ainda não tinha entrado no orçamento variável — a partir de agora conta
  st.lancamentos.forEach(function(l){
    if(l.pagamento==='cartao'&&!l.contabilizado){
      l.contabilizado=true;
    }
  });

  // Avança parcelas dos lançamentos de cartão parcelados; remove lançamentos em dinheiro (assumidos resolvidos no mês)
  // Compras à vista no cartão permanecem até serem pagas de verdade (ação separada por cartão)
  st.lancamentos=st.lancamentos.filter(function(l){
    if(l.pagamento!=='cartao')return false; // remove lançamentos em dinheiro
    if(l.totalParcelas<=1)return true; // à vista: mantém até pagamento explícito da fatura
    l.parcelaAtual++;
    l.contabilizado=true; // fatia nova do parcelado já é conhecida, conta direto (sem adiar de novo)
    l.faturaPaga=false; // fatia nova, ainda não paga
    return l.parcelaAtual<=l.totalParcelas;
  });

  // Avança dívidas normais existentes
  st.dividas=st.dividas.filter(function(d){
    d.pago=false;
    d.parcelaAtual++;
    return d.parcelaAtual<=d.totalParcelas;
  });

  salvar();
  document.getElementById('modal-virar').style.display='none';
  alert('✅ Mês virado! Histórico salvo. Compras no cartão feitas até agora já contam no orçamento variável do novo mês.');
  render();
}

function exportarDados(){
  var d={salario:st.salario,gastos:st.gastos,cartoes:st.cartoes,lancamentos:st.lancamentos,envelopes:st.envelopes,historico:st.historico,dividas:st.dividas,receitas:st.receitas,receitasFixas:st.receitasFixas,investimentos:st.investimentos,catsOverride:st.catsOverride,catsReceitaOverride:st.catsReceitaOverride,catsInvestOverride:st.catsInvestOverride,subcats:st.subcats,metasPct:st.metasPct,exportadoEm:new Date().toLocaleString('pt-BR')};
  var json=JSON.stringify(d,null,2);
  // Método compatível com iPhone Safari
  var dataStr="data:application/json;charset=utf-8,"+encodeURIComponent(json);
  var a=document.createElement('a');
  a.href=dataStr;
  a.download='minha-grana-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function importarDados(){
  var input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.salario){alert('Arquivo inválido!');return;}
        if(!confirm('Isso vai substituir os dados atuais. Continuar?'))return;
        st.salario=d.salario;st.salTemp=d.salario;
        st.gastos=d.gastos||GASTOS_PADRAO;st.cartoes=d.cartoes||CARTOES_PADRAO;
        st.lancamentos=d.lancamentos||[];st.envelopes=d.envelopes||ENVELOPES_PADRAO;st.historico=d.historico||[];
        st.dividas=d.dividas||DIVIDAS_PADRAO;
        st.receitas=d.receitas||[];
        st.receitasFixas=d.receitasFixas||RECEITAS_FIXAS_PADRAO;
        st.investimentos=d.investimentos||INVESTIMENTOS_PADRAO;
        st.catsOverride=d.catsOverride||CATS_OVERRIDE_PADRAO;
        st.catsReceitaOverride=d.catsReceitaOverride||CATS_RECEITA_OVERRIDE_PADRAO;
        st.catsInvestOverride=d.catsInvestOverride||CATS_INVEST_OVERRIDE_PADRAO;
        st.subcats=d.subcats||SUBCATS_PADRAO;
        st.metasPct=d.metasPct||METAS_PADRAO;
        salvar();render();alert('✅ Dados restaurados!');
      }catch(err){alert('Erro ao importar.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

// PWA
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex';});
document.getElementById('install-btn').addEventListener('click',function(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('install-banner').style.display='none';});});
document.getElementById('dismiss-btn').addEventListener('click',function(){document.getElementById('install-banner').style.display='none';});
window.addEventListener('appinstalled',function(){document.getElementById('install-banner').style.display='none';});
if('serviceWorker' in navigator){
  // Removido: o service worker via Blob URL estava causando problemas de atualização.
  // Agora desativamos qualquer service worker e cache antigos, deixando o app sempre buscar a versão mais nova.
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){reg.unregister();});
  }).catch(function(){});
  if(window.caches){
    caches.keys().then(function(keys){
      keys.forEach(function(k){caches.delete(k);});
    }).catch(function(){});
  }
}
